---
template:
  type: file
  path: athena/capacity_reservation.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  capacity_reservations:
    - name: ExampleCapacityReservation1
      capacity_reservation_name: CapacityReservation1
      target_dpus: 10
      deletion_policy: Retain
      update_replace_policy: Retain
      capacity_assignment_configuration:
        capacity_assignments:
          - workgroup_names:
              - Workgroup1
              - Workgroup2
      tags:
        Environment: Production
        Owner: TeamA
    - name: ExampleCapacityReservation2
      capacity_reservation_name: CapacityReservation2
      target_dpus: 20
      deletion_policy: Delete
      update_replace_policy: Delete
      capacity_assignment_configuration:
        capacity_assignments:
          - workgroup_names:
              - Workgroup3
              - Workgroup4
      tags:
        Environment: Development
        Owner: TeamB
