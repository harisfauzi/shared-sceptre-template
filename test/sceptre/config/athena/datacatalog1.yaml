---
template:
  type: file
  path: athena/data_catalog.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  data_catalogs:
    - name: ExampleDataCatalog1
      data_catalog_name: DataCatalog1
      type: GLUE
      connection_type: JDBC
      description: "An example data catalog."
      deletion_policy: Retain
      update_replace_policy: Retain
      parameters:
        Param1: Value1
        Param2: Value2
      status: ACTIVE
      tags:
        Environment: Production
        Owner: TeamA
    - name: ExampleDataCatalog2
      data_catalog_name: DataCatalog2
      type: HIVE
      connection_type: S3
      description: "Another example data catalog."
      deletion_policy: Delete
      update_replace_policy: Delete
      parameters:
        ParamA: ValueA
        ParamB: ValueB
      status: INACTIVE
      tags:
        Environment: Development
        Owner: TeamB
