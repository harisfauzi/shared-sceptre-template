---
template:
  type: file
  path: athena/prepared_statement.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  prepared_statements:
    - name: ExamplePreparedStatement1
      query_statement: "SELECT * FROM example_table1"
      statement_name: PreparedStatement1
      work_group: WorkGroup1
      description: "An example prepared statement."
      deletion_policy: Retain
      update_replace_policy: Retain
    - name: ExamplePreparedStatement2
      query_statement: "SELECT column1, column2 FROM example_table2 WHERE column3 = 'value'"
      statement_name: PreparedStatement2
      work_group: WorkGroup2
      description: "Another example prepared statement."
      deletion_policy: Delete
      update_replace_policy: Delete
