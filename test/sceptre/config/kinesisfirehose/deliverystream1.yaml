---
template:
  type: file
  path: kinesis_firehose/delivery_stream.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS Kinesis Firehose Delivery Streams
  use_parameter_for_password: false
  delivery_streams:
    - name: PrimaryProductionDeliveryStream
      delivery_stream_type: "DirectPut"
      delivery_stream_name: "prod-analytics-stream"
      delivery_stream_encryption_configuration_input:
        key_type: "AWS_OWNED_CMK"
      extended_s3_destination_configuration:
        role_arn: "arn:aws:iam::123456789012:role/firehose-s3-role "
        bucket_arn: "arn:aws:s3:::prod-analytics-bucket"
        prefix: "analytics/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        error_output_prefix: "analytics/errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/!{timestamp:HH}:!{timestamp:mm}:!{timestamp:ss}"
        compression_format: "GZIP"
        buffering_hints:
          size_in_mbs: 128
          interval_in_seconds: 300
        processing_configuration:
          enabled: true
          processors:
            - type: "Lambda"
              parameters:
                - parameter_name: "LambdaArn"
                  parameter_value: "arn:aws:lambda:us-east-1:123456789012:function:firehose-transformation "
        data_format_conversion_configuration:
          enabled: true
          input_format_configuration:
            deserializer:
              openx_json_ser_de:
                case_insensitive: true
                convert_dots_in_json_keys_to_underscore: true
                column_to_json_key_mappings:
                  event_id: "eventId"
                  event_type: "eventType"
                  timestamp: "ts"
          output_formation_configuration:
            serializer:
              parquet_ser_de:
                compression: "SNAPPY"
                enable_dictionary_compression: true
                max_padding_bytes: 0
                page_size_bytes: 1048576
                writer_version: "V1"
          schema_configuration:
            role_arn: "arn:aws:iam::123456789012:role/glue-catalog-role "
            database_name: "analytics_db"
            table_name: "events"
            region: "us-east-1"
            version_id: "LATEST "
        dynamic_partitioning_configuration:
          enabled: true
          retry_options:
            duration_in_seconds: 3600
        encryption_configuration:
          kms_encryption_config:
            aws_kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012 "
        s3_backup_mode: "Enabled"
        s3_backup_configuration:
          role_arn: "arn:aws:iam::123456789012:role/firehose-backup-role "
          bucket_arn: "arn:aws:s3:::prod-analytics-backup"
          prefix: "backup/backup_time=!{timestamp:yyyy}-!{timestamp:MM}-!{timestamp:dd}-!{timestamp:HH}-!{timestamp:mm}-!{timestamp:ss}/"
          compression_format: "GZIP"
          buffering_hints:
            size_in_mbs: 32
            interval_in_seconds: 900
        cloud_watch_logging_options:
          enabled: true
          log_group_name: "/aws/kinesisfirehose/prod-analytics"
          log_stream_name: "S3Delivery"
      tags:
        Environment: Production
        Team: DataEngineering
        CostCenter: "2001"
        Backup: "Enabled"
    - name: SecondaryProductionDeliveryStream
      delivery_stream_type: "DirectPut"
      delivery_stream_name: "prod-opensearch-stream"
      elastic_search_destination_configuration:
        domain_arn: "arn:aws:es:us-east-1:123456789012:domain/prod-search "
        index_name: "prod-events-index"
        role_arn: "arn:aws:iam::123456789012:role/firehose-opensearch-role "
        cluster_endpoint: "prod-search.us-east-1.es.amazonaws.com"
        index_rotation_period: "OneDay"
        type_name: "_doc"
        s3_configuration:
          role_arn: "arn:aws:iam::123456789012:role/firehose-opensearch-s3-role "
          bucket_arn: "arn:aws:s3:::prod-opensearch-backup"
          prefix: "opensearch-logs/"
          compression_format: "GZIP"
          buffering_hints:
            size_in_mbs: 32
            interval_in_seconds: 300
        buffering_hints:
          size_in_mbs: 64
          interval_in_seconds: 60
        retry_options:
          duration_in_seconds: 300
        s3_backup_mode: "FailedDocumentsOnly"
        cloud_watch_logging_options:
          enabled: true
          log_group_name: "/aws/kinesisfirehose/prod-opensearch"
          log_stream_name: "ElasticsearchDelivery"
        vpc_configuration:
          subnet_ids:
            - "subnet-12345678 "
            - "subnet-87654321 "
          security_group_ids:
            - "sg-12345678 "
          role_arn: "arn:aws:iam::123456789012:role/firehose-vpc-role "
      tags:
        Environment: Production
        Team: Search
        CostCenter: "2002"
    - name: TertiaryDevelopmentDeliveryStream
      delivery_stream_type: "DirectPut"
      delivery_stream_name: "dev-http-stream"
      http_endpoint_destination_configuration:
        endpoint_configuration:
          url: "https://http-intake.datadoghq.com/api/v2/logs"
          name: "DatadogEndpoint"
          access_key: "datadog-api-key-placeholder"
        s3_configuration:
          role_arn: "arn:aws:iam::123456789012:role/firehose-http-backup-role "
          bucket_arn: "arn:aws:s3:::dev-http-backup"
          prefix: "datadog/"
          compression_format: "UNCOMPRESSED"
          buffering_hints:
            size_in_mbs: 10
            interval_in_seconds: 300
        buffering_hints:
          size_in_mbs: 5
          interval_in_seconds: 300
        retry_options:
          duration_in_seconds: 3600
        s3_backup_mode: "AllData"
        request_configuration:
          content_encoding: "GZIP"
          common_attributes:
            - attribute_name: "Environment"
              attribute_value: "development"
            - attribute_name: "DataFormat"
              attribute_value: "json"
      tags:
        Environment: Development
        Team: Integration
        CostCenter: "2003"

stack_tags:
  Test: kinesis-firehose-deliverystream
