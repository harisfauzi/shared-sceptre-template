---
template:
  type: file
  path: cloudtrail/channel.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "Sample CloudTrail Channel Configuration"
  channels:
    - name: OrganizationChannel
      channel_name: organization-channel
      source: "aws.cloudtrail"
      deletion_policy: Retain
      update_replace_policy: Retain
      destinations:
        - location: "!Sub arn:aws:s3:::audit-bucket/organization-channel"
          type: "S3"
        - location: "!Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
          type: "EventBridge"
      tags:
        Environment: Production
        ManagedBy: Sceptre
        Purpose: OrganizationAuditing

    - name: ApplicationChannel
      channel_name: application-channel
      source: "aws.cloudtrail"
      deletion_policy: Delete
      update_replace_policy: Delete
      destinations:
        - location: "!Sub arn:aws:s3:::app-audit-bucket/application-channel"
          type: "S3"
      tags:
        Environment: Development
        Usage: ApplicationMonitoring

stack_tags:
  Test: cloudformation-lambda-hook
