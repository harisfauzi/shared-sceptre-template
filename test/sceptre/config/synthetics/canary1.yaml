---
template:
  type: file
  path: synthetics/canary.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "Synthetics Canary(s) for continuous monitoring"
  canaries:
    - name: Canary1
      deletion_policy: Delete
      update_replace_policy: Delete
      canary_name: api-health-check
      artifact_s3_location: s3://my-canary-artifacts/canary1/
      execution_role_arn: arn:aws:iam::123456789012:role/canary-execution-role
      runtime_version: "syn-nodejs-puppeteer-3.9"
      schedule:
        expression: "rate(5 minutes)"
        duration_in_seconds: "60"
      code:
        handler: "index.handler"
        script: |-
          const synthetics = require('Synthetics');
          const http = require('http');
          const url = 'https://api.example.com/health';
          const apiCanary = async function () {
            try {
              const response = await http.get(url);
              if (response.statusCode === 200) {
                console.log('API is healthy');
              }
            } catch (error) {
              throw error;
            }
          };
          exports.handler = async () => {
            return apiCanary();
          };
      tags:
        Environment: Test
        Owner: "{{ stack_group_config.owner | default('DevOps') }}"
        Purpose: HealthCheck

    - name: Canary2
      deletion_policy: Retain
      update_replace_policy: Retain
      canary_name: web-ui-visual-check
      artifact_s3_location: s3://my-canary-artifacts/canary2/
      execution_role_arn: arn:aws:iam::123456789012:role/canary-execution-role
      runtime_version: "syn-nodejs-puppeteer-3.9"
      schedule:
        expression: "rate(1 hour)"
        retry_config:
          max_retries: 2
      code:
        blue_print_types:
          - ApiCanary
          - UiCanary
        s3_bucket: my-canary-code-bucket
        s3_key: canary-scripts/web-ui-check.zip
        s3_object_version: "v1.0.1"
        dependencies:
          - reference: arn:aws:lambda:us-east-1:123456789012:layer:shared-libs
            type: Layer
      browser_configs:
        - browser_type: "chromium"
      dry_run_and_update: true
      failure_retention_period: 31
      provisioned_resource_cleanup: "True"
      success_retention_period: 31
      start_canary_after_creation: true
      run_config:
        active_tracing: true
        memory_in_mb: 960
        timeout_in_seconds: 60
        ephemeral_storage: 512
        environment_variables:
          ENVIRONMENT: "test"
          LOG_LEVEL: "DEBUG"
      artifact_config:
        s3_encryption:
          kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      resources_to_replicate_tags:
        - "Environment"
        - "Owner"
      vpc_config:
        security_group_ids:
          - "sg-12345678"
          - "sg-87654321"
        subnet_ids:
          - "subnet-12345678"
          - "subnet-87654321"
        vpc_id: "vpc-12345678"
        ipv6_allowed_for_dual_stack: false
      tags:
        Environment: Test
        Owner: "{{ stack_group_config.owner | default('DevOps') }}"
        Purpose: UiVisualTesting

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: synthetics-canary
