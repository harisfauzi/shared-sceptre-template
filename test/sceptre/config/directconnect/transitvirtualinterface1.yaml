  source_repo_url: "{{git_repo}}"
  description: AWS DirectConnect Transit Virtual Interfaces
  transit_virtual_interfaces:
    - name: PrimaryCorpTransitInterface
      connection_id: "dxcon-12345678901234567 "
      direct_connect_gateway_id: "dcgw-12345678901234567 "
      virtual_interface_name: "corporate-primary-tvi"
      vlan: 700
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Environment: Production
        Department: Infrastructure
        Interface: Primary
      bgp_peers:
        - address_family: "ipv4"
          asn: 65000
          amazon_address: "169.254.30.1/30"
          customer_address: "169.254.30.2/30"
          auth_key: "TransitAuthKey12345"
        - address_family: "ipv6"
          asn: 65000
          amazon_address: "fe80::1/64"
          customer_address: "fe80::2/64"
    - name: SecondaryRemoteTransitInterface
      connection_id: "dxcon-87654321098765432 "
