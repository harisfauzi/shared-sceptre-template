          asn: 65001
          amazon_address: "169.254.31.1/30"
          customer_address: "169.254.31.2/30"
          bgp_peer_id: "bgp-peer-transit-secondary"
    - name: TertiaryBackupTransitInterface
      connection_id: "dxcon-abcdef1234567890ab "
      direct_connect_gateway_id: "dcgw-abcdef1234567890ab "
