---
template:
  type: file
  path: directconnect/public_virtual_interface.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS DirectConnect Public Virtual Interfaces
  public_virtual_interfaces:
    - name: PrimaryCorpPublicInterface
      connection_id: "dxcon-12345678901234567 "
      virtual_interface_name: "corporate-primary-pvi"
      vlan: 400
      route_filter_prefixes:
        - "203.0.113.0/24"
        - "198.51.100.0/24"
        - "52.0.0.0/8"
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Environment: Production
        Department: Infrastructure
        Interface: Primary
      bgp_peers:
        - address_family: "ipv4"
          asn: 65000
          amazon_address: "169.254.20.1/30"
          customer_address: "169.254.20.2/30"
          auth_key: "PublicAuthKey12345"
        - address_family: "ipv6"
          asn: 65000
          amazon_address: "fe80::1/64"
          customer_address: "fe80::2/64"
    - name: SecondaryRemotePublicInterface
      connection_id: "dxcon-87654321098765432 "
      virtual_interface_name: "remote-office-secondary-pvi"
      vlan: 500
      allocate_public_virtual_interface_role_arn: "arn:aws:iam::210987654321:role/DirectConnectPublicAllocationRole "
      route_filter_prefixes:
        - "203.0.114.0/24"
      deletion_policy: Delete
      tags:
        Environment: Staging
        Department: Operations
        Interface: Secondary
      bgp_peers:
        - address_family: "ipv4"
          asn: 65001
          amazon_address: "169.254.21.1/30"
          customer_address: "169.254.21.2/30"
          bgp_peer_id: "bgp-peer-secondary"
    - name: TertiaryBackupPublicInterface
      connection_id: "dxcon-abcdef1234567890ab "
      virtual_interface_name: "backup-tertiary-pvi"
      vlan: 600
      deletion_policy: Retain
      tags:
        Environment: Development
        Department: Testing
        Interface: Backup
      bgp_peers:
        - address_family: "ipv4"
          asn: 65002
          amazon_address: "169.254.22.1/30"
          customer_address: "169.254.22.2/30"

stack_tags:
  Test: directconnect-public-virtual-interface
