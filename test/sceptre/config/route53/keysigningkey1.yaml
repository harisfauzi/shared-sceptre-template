---
template:
  type: file
  path: route53/key_signing_key.yaml.j2

sceptre_user_data:
  description: "Route53 Key Signing Key(s) for {{project_code}}"
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  key_signing_keys:
    - name: KeySigningKeyPrimary
      hosted_zone_id: "Z1234567890ABC"
      key_management_service_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      key_signing_key_name: "example.com-ksk-primary"
      status: "ACTIVE"
    - name: KeySigningKeySecondary
      hosted_zone_id: "Z0987654321DEF"
      key_management_service_arn: "arn:aws:kms:us-west-2:123456789012:key/87654321-4321-4321-4321-987654321098"
      key_signing_key_name: "internal.example.com-ksk-secondary"
      status: "ACTIVE"
      deletion_policy: "Retain"
      update_replace_policy: "Retain"

stack_tags:
  Test: route53-key-signing-key
