---
template:
  type: file
  path: route53/record_set_group.yaml.j2

sceptre_user_data:
  description: "Route53 Record Set Group(s) for {{stack_group_config.project_code}}"
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  record_set_groups:
    - name: RecordSetGroupPublic
      hosted_zone_id: "Z1234567890ABC"
      comment: "Public DNS records for example.com"
      record_sets:
        - record_set_name: "example.com."
          type: "A"
          alias_target:
            dns_name: "d123456789.cloudfront.net."
            hosted_zone_id: "Z2FDTNDATAQYW2"
            evaluate_target_health: false
        - record_set_name: "www.example.com."
          type: "A"
          alias_target:
            dns_name: "example.com.s3-website-us-east-1.amazonaws.com."
            hosted_zone_id: "Z3AQQSTJ8EXAMPLE"
        - record_set_name: "mail.example.com."
          type: "MX"
          ttl: "3600"
          resource_records:
            - "10 mail.example.com."
            - "20 mail2.example.com."
          comment: "Mail server records"
    - name: RecordSetGroupWeighted
      hosted_zone_name: "internal.example.com."
      comment: "Weighted routing records for load distribution"
      record_sets:
        - record_set_name: "api.internal.example.com."
          type: "A"
          set_identifier: "API-Primary"
          weight: 70
          resource_records:
            - "10.0.1.100"
        - record_set_name: "api.internal.example.com."
          type: "A"
          set_identifier: "API-Secondary"
          weight: 30
          resource_records:
            - "10.0.2.100"
    - name: RecordSetGroupFailover
      hosted_zone_id: "Z0987654321DEF"
      comment: "Failover routing records"
      deletion_policy: "Retain"
      update_replace_policy: "Retain"
      record_sets:
        - record_set_name: "service.example.com."
          type: "A"
          set_identifier: "Service-Primary"
          failover: "PRIMARY"
          alias_target:
            dns_name: "primary.example.com."
            hosted_zone_id: "Z1234567890ABC"
            evaluate_target_health: true
          health_check_id: "abcd1234-efgh-5678-ijkl-9012mn34pqrs"
        - record_set_name: "service.example.com."
          type: "A"
          set_identifier: "Service-Secondary"
          failover: "SECONDARY"
          resource_records:
            - "203.0.113.50"

stack_tags:
  Test: route53-record-set-group
