---
template:
  type: file
  path: docdb/db_cluster.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: DocDB DB Cluster(s) for Production Environment
  use_parameter_for_password: true
  db_clusters:
    - name: PrimaryDBCluster
      db_cluster_identifier: primary-docdb-cluster
      master_username: docadmin
      master_user_password: "ChangeMe123!@#"
      engine_version: "4.0.0"
      availability_zones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
      backup_retention_period: 30
      preferred_backup_window: "03:00-04:00"
      preferred_maintenance_window: "sun:04:00-sun:05:00"
      copy_tags_to_snapshot: true
      deletion_protection: true
      storage_encrypted: true
      kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      db_cluster_parameter_group_name: "primary-docdb-params"
      vpc_security_group_ids:
        - "sg-0123456789abcdef0"
      enable_cloudwatch_logs_exports:
        - audit
        - profiler
        - error
      tags:
        Environment: Production
        Team: Database
        CostCenter: Engineering
      deletion_policy: Snapshot
      update_replace_policy: Snapshot
    - name: SecondaryDBCluster
      db_cluster_identifier: secondary-docdb-cluster
      master_username: docadmin
      master_user_password: "ChangeMe456!@#"
      engine_version: "4.0.0"
      availability_zones:
        - us-west-2a
        - us-west-2b
      backup_retention_period: 7
      copy_tags_to_snapshot: false
      deletion_protection: false
      storage_encrypted: true
      db_cluster_parameter_group_name: "secondary-docdb-params"
      vpc_security_group_ids:
        - "sg-0987654321fedcba0"
      enable_cloudwatch_logs_exports:
        - audit
      tags:
        Environment: Production
        Team: Database
        Tier: ReadReplica
    - name: DevelopmentDBCluster
      db_cluster_identifier: dev-docdb-cluster
      master_username: devadmin
      master_user_password: "DevPassword789!@#"
      engine_version: "3.6.0"
      availability_zones:
        - us-east-1a
      backup_retention_period: 1
      storage_encrypted: false
      serverless_v2_scaling_configuration:
        min_capacity: 0.5
        max_capacity: 1
      tags:
        Environment: Development
        Team: Database

stack_tags:
  Test: docdb-cluster
