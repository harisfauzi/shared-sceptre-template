---
template:
  type: file
  path: docdb/db_instance.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: DocDB DB Instance(s) for Production Cluster
  db_instances:
    - name: PrimaryDBInstance
      db_cluster_identifier: primary-docdb-cluster
      db_instance_class: db.t3.medium
      db_instance_identifier: primary-docdb-instance-01
      availability_zone: us-east-1a
      auto_minor_version_upgrade: true
      enable_performance_insights: true
      preferred_maintenance_window: "sun:04:00-sun:05:00"
      ca_certificate_identifier: rds-ca-2019
      tags:
        Role: Primary
        Environment: Production
        Tier: Writer
      deletion_policy: Delete
      update_replace_policy: Delete
    - name: SecondaryDBInstance
      db_cluster_identifier: primary-docdb-cluster
      db_instance_class: db.t3.medium
      db_instance_identifier: primary-docdb-instance-02
      availability_zone: us-east-1b
      auto_minor_version_upgrade: true
      enable_performance_insights: false
      tags:
        Role: Secondary
        Environment: Production
        Tier: Reader
    - name: TertiaryDBInstance
      db_cluster_identifier: primary-docdb-cluster
      db_instance_class: db.t3.small
      db_instance_identifier: primary-docdb-instance-03
      availability_zone: us-east-1c
      auto_minor_version_upgrade: false
      enable_performance_insights: true
      certificate_rotation_restart: false
      tags:
        Role: Tertiary
        Environment: Production
        Tier: Reader
    - name: DevelopmentDBInstance
      db_cluster_identifier: dev-docdb-cluster
      db_instance_class: db.t3.micro
      db_instance_identifier: dev-docdb-instance-01
      availability_zone: us-east-1a
      auto_minor_version_upgrade: true
      enable_performance_insights: false
      tags:
        Environment: Development
        Tier: SingleNode

stack_tags:
  Test: docdb-instance
