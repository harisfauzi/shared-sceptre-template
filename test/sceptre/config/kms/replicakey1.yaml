---
template:
  type: file
  path: kms/replica_key.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "KMS Replica Key(s) for testing purposes"
  replica_keys:
    - name: ReplicaKeyUsWest2
      primary_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      description: "Replica of primary KMS key in US West 2"
      enabled: true
      pending_window_in_days: 7
      tags:
        Environment: Production
        Region: us-west-2
        Purpose: DisasterRecovery
        PrimaryKeyRegion: us-east-1

    - name: ReplicaKeyEuWest1
      primary_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      key_policy_json: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "Enable IAM policies",
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::123456789012:root"
              },
              "Action": "kms:*",
              "Resource": "*"
            },
            {
              "Sid": "Allow use of the key in EU region",
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::123456789012:role/eu-data-access"
              },
              "Action": [
                "kms:Decrypt",
                "kms:GenerateDataKey",
                "kms:DescribeKey"
              ],
              "Resource": "*"
            }
          ]
        }
      description: "Replica of primary KMS key in EU West 1"
      enabled: true
      pending_window_in_days: 14
      tags:
        Environment: Production
        Region: eu-west-1
        Compliance: GDPR
        PrimaryKeyRegion: us-east-1

    - name: ReplicaKeyApSoutheast1
      primary_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      description: "Replica of primary KMS key in Asia Pacific"
      enabled: true
      pending_window_in_days: 7
      tags:
        Environment: Production
        Region: ap-southeast-1
        DataResidency: AsiaPacific
        PrimaryKeyRegion: us-east-1

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: kms-replica-key
