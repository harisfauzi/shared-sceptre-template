---
template:
  type: file
  path: wafregional/rate_based_rule.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "WAFRegional Rate Based Rule(s) for testing purposes"
  rate_based_rules:
    - name: AttackThrottlingRule
      rate_based_rule_name: attack-throttling-rule
      metric_name: AttackThrottlingRuleMetric
      rate_key: IP
      rate_limit: 2000
      deletion_policy: Delete
      update_replace_policy: Delete
      match_predicates:
        - data_id: AllowedIpAddressesIpSet
          negated: false
          type: IPMatch
        - data_id: SqlInjectionByteMatchSet
          negated: true
          type: ByteMatch

    - name: ApiRateLimitRule
      rate_based_rule_name: api-rate-limit-rule
      metric_name: ApiRateLimitRuleMetric
      rate_key: FORWARDED_IP
      rate_limit: 5000
      deletion_policy: Delete
      update_replace_policy: Delete
      match_predicates:
        - data_id: BlockedCountriesGeoMatchSet
          negated: true
          type: GeoMatch

    - name: BruteForceProtectionRule
      rate_based_rule_name: brute-force-protection-rule
      metric_name: BruteForceProtectionRuleMetric
      rate_key: IP
      rate_limit: 1000
      deletion_policy: Retain
      update_replace_policy: Retain

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: wafregional-rate-based-rule
