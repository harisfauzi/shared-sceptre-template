---
template:
  type: file
  path: s3express/access_point.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: {{ git_repo }}
  description: CloudFormation template to test S3Express AccessPoints with comprehensive Jinja2 template coverage.
  access_points:
    - name: ApplicationDataAccessPoint
      bucket: app-data-bucket-prod
      deletion_policy: Retain
      update_replace_policy: Retain

    - name: AnalyticsAccessPoint
      bucket: analytics-bucket-prod
      bucket_account_id: "123456789012"
      policy: |-
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
            Resource: arn:aws:s3:us-east-1:123456789012:accesspoint/analytics-ap/object/data/*
            Principal:
              AWS: arn:aws:iam::123456789012:role/DataAnalystRole
      public_access_block_configuration:
        block_public_acls: true
        block_public_policy: true
        ignore_public_acls: true
        restrict_public_buckets: true
      tags:
        Environment: Production
        Team: DataEngineering
        CostCenter: Analytics

    - name: ScopedAccessPoint
      bucket: scoped-bucket-prod
      policy_json: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "s3:GetObject",
                "s3:PutObject"
              ],
              "Resource": "arn:aws:s3:us-east-1:123456789012:accesspoint/analytics-ap/object/data/*",
              "Principal": {
                "AWS": "arn:aws:iam::123456789012:role/DataAnalystRole"
              }
            }
          ]
        }
      public_access_block_configuration:
        block_public_acls: false
        block_public_policy: true
        ignore_public_acls: false
        restrict_public_buckets: true
      scope:
        permissions:
          - GetObject
          - PutObject
          - ListBucket
        prefixes:
          - users/
          - shared/
      vpc_configuration:
        vpc_id: vpc-0123456789abcdef0
      tags:
        Environment: Production
        Owner: DataTeam

stack_tags:
  Test: s3-accesspoint
