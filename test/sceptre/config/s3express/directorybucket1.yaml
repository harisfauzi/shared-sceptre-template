---
template:
  type: file
  path: s3express/directory_bucket.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: {{ git_repo }}
  description: CloudFormation template to test S3Express DirectoryBucket with comprehensive Jinja2 template coverage.
  directory_buckets:
    - name: BasicDirectoryBucket
      data_redundancy: SingleAvailabilityZone 
      location_name: us-east-1
      tags:
        Environment: Development
        Purpose: Testing

    - name: EncryptedDirectoryBucket
      data_redundancy: SingleLocalZone
      location_name: us-west-2
      bucket_name: encrypted-dir-bucket-prod
      deletion_policy: Retain
      update_replace_policy: Retain
      bucket_encryption:
        server_side_encryption_configuration:
          - server_side_encryption_by_default:
              sse_algorithm: AES256
          - bucket_key_enabled: true
            server_side_encryption_by_default:
              sse_algorithm: aws:kms
              kms_master_key_id: alias/cmk-default-s3express
      tags:
        Environment: Production
        DataClassification: Sensitive
        Team: DataEngineering

    - name: FullFeaturedDirectoryBucket
      data_redundancy: SingleAvailabilityZone 
      location_name: us-east-1
      bucket_name: full-featured-dir-bucket-prod
      bucket_encryption:
        server_side_encryption_configuration:
          - server_side_encryption_by_default:
              sse_algorithm: aws:kms
              kms_master_key_id: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012
            bucket_key_enabled: true
      lifecycle_configuration:
        rules:
          - id: ExpireOldVersions
            status: Enabled
            prefix: versioned/
            expiration_in_days: 90
          - id: ExpireSmallObjects
            status: Enabled
            prefix: temp/
            object_size_less_than: "1048576"
            expiration_in_days: 7
          - id: ExpireLargeArchives
            status: Enabled
            prefix: archive/
            object_size_greater_than: "1099511627776"
            expiration_in_days: 365
          - id: CleanupIncompleteUploads
            status: Enabled
            abort_incomplete_multipart_upload:
              days_after_initiation: 7
      metrics_configurations:
        - id: MetricsForDataPrefix
          prefix: data/
        - id: MetricsForAccessPoint
          access_point_arn: arn:aws:s3:us-east-1:123456789012:accesspoint/analytics-ap
      bucket_policy:
        policy_document: |-
          Version: "2012-10-17"
          Statement:
            - Sid: EnforceSSLOnly
              Effect: Deny
              Principal: "*"
              Action: "s3:*"
              Resource:
                - "arn:aws:s3:us-east-1:123456789012:bucket/full-featured-dir-bucket-prod"
                - "arn:aws:s3:us-east-1:123456789012:bucket/full-featured-dir-bucket-prod/object/*"
              Condition:
                Bool:
                  "aws:SecureTransport": "false"
            - Sid: AllowDataAnalystAccess
              Effect: Allow
              Principal:
                AWS: "arn:aws:iam::123456789012:role/DataAnalystRole"
              Action:
                - "s3:GetObject"
                - "s3:ListBucket"
              Resource:
                - "arn:aws:s3:us-east-1:123456789012:bucket/full-featured-dir-bucket-prod"
                - "arn:aws:s3:us-east-1:123456789012:bucket/full-featured-dir-bucket-prod/object/analytics/*"
      tags:
        Environment: Production
        Application: Analytics
        CostCenter: DataTeam
        Owner: CloudEngineering

stack_tags:
  Test: s3express-directory-bucket
