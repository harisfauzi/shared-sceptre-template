---
template:
  type: file
  path: ecs/task_set.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: 'ECS Task Sets for test environment'
  task_sets:
    - name: ProductionTaskSet
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/production-cluster'
      service: 'arn:aws:ecs:us-east-1:123456789012:service/production-cluster/production-service'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/myapp:1'
      deletion_policy: 'Retain'
      update_replace_policy: 'Retain'
      launch_type: 'FARGATE'
      platform_version: '1.4.0'
      external_id: 'prod-external-id-12345'
      capacity_provider_strategy:
        - capacity_provider: 'FARGATE'
          base: 2
          weight: 100
        - capacity_provider: 'FARGATE_SPOT'
          weight: 50
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-12345678'
            - 'subnet-87654321'
          security_groups:
            - 'sg-12345678'
          assign_public_ip: 'ENABLED'
      load_balancers:
        - container_name: 'myapp-container'
          container_port: 8080
          target_group_arn: 'arn:aws:elasticloadbalancing:us-east-1:123456789012:targetgroup/myapp-tg/1234567890abcdef'
      scale:
        unit: 'PERCENT'
        value: 100
      tags:
        Name: ProductionTaskSet
        Environment: production
        Team: platform
    - name: DevelopmentTaskSet
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/development-cluster'
      service: 'arn:aws:ecs:us-east-1:123456789012:service/development-cluster/development-service'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/myapp:latest'
      launch_type: 'FARGATE'
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-dev12345'
          security_groups:
            - 'sg-dev12345'
      scale:
        unit: 'COUNT'
        value: 2
      tags:
        Name: DevelopmentTaskSet
        Environment: development
    - name: BlueGreenTaskSet
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/bluegreen-cluster'
      service: 'arn:aws:ecs:us-east-1:123456789012:service/bluegreen-cluster/bluegreen-service'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/bgapp:2'
      launch_type: 'EC2'
      platform_version: 'LATEST'
      capacity_provider_strategy:
        - capacity_provider: 'asg-capacity-provider'
          weight: 100
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-bg12345'
          security_groups:
            - 'sg-bg12345'
          assign_public_ip: 'DISABLED'
      load_balancers:
        - container_name: 'bgapp'
          container_port: 3000
          target_group_arn: 'arn:aws:elasticloadbalancing:us-east-1:123456789012:targetgroup/bgapp-tg/abcdef1234567890'
      scale:
        unit: 'PERCENT'
        value: 50
      tags:
        Name: BlueGreenTaskSet
        Environment: production
        DeploymentStrategy: bluegreen

stack_tags:
  Test: ecs-task-set
