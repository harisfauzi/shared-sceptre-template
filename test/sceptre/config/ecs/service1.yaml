---
template:
  type: file
  path: ecs/service.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: 'ECS Services for test environment'
  services:
    - name: ProductionService
      service_name: production-service
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/production-cluster'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/myapp:1'
      desired_count: 3
      launch_type: 'FARGATE'
      platform_version: 'LATEST'
      scheduling_strategy: 'REPLICA'
      propagate_tags: 'TASK_DEFINITION'
      enable_ecs_managed_tags: true
      enable_execute_command: true
      deployment_controller:
        type: 'ECS'
      deployment_configuration:
        maximum_percent: 200
        minimum_healthy_percent: 100
        deployment_circuit_breaker:
          enable: true
          rollback: true
      capacity_provider_strategy:
        - base: 1
          capacity_provider: 'FARGATE'
          weight: 100
      placement_strategies:
        - type: 'SPREAD'
          field: 'attribute:ecs.availability-zone'
        - type: 'SPREAD'
          field: 'attribute:ecs.instance-type'
      load_balancers:
        - container_name: 'myapp-container'
          container_port: 8080
          target_group_arn: 'arn:aws:elasticloadbalancing:us-east-1:123456789012:targetgroup/myapp-tg/1234567890abcdef'
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-12345678'
            - 'subnet-87654321'
          security_groups:
            - 'sg-12345678'
          assign_public_ip: 'ENABLED'
      service_connect_configuration:
        enabled: true
        namespace: 'production.local'
        log_configuration:
          log_driver: 'awslogs'
          options:
            awslogs-group: '/ecs/service/production-service'
            awslogs-region: 'us-east-1'
            awslogs-stream-prefix: 'ecs'
          secret_options:
            - name: 'db_password'
              value_from: 'arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password'
        services:
          - port_name: 'http'
            client_aliases:
              - port: 80
                dns_name: 'myapp.production.local'
            discovery_name: 'myapp'
            ingress_port_override: 8080
      role: 'arn:aws:iam::123456789012:role/ecsServiceRole'
      health_check_grace_period_seconds: 60
      tags:
        Name: ProductionService
        Environment: production
        Team: platform
    - name: DevelopmentService
      service_name: development-service
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/development-cluster'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/myapp:1'
      desired_count: 1
      launch_type: 'FARGATE'
      deployment_controller:
        type: 'ECS'
      deployment_configuration:
        maximum_percent: 200
        minimum_healthy_percent: 50
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-dev12345'
          security_groups:
            - 'sg-dev12345'
          assign_public_ip: 'DISABLED'
      tags:
        Name: DevelopmentService
        Environment: development
    - name: SpotService
      cluster: 'arn:aws:ecs:us-east-1:123456789012:cluster/spot-cluster'
      task_definition: 'arn:aws:ecs:us-east-1:123456789012:task-definition/batch-job:2'
      desired_count: 5
      scheduling_strategy: 'REPLICA'
      capacity_provider_strategy:
        - base: 2
          capacity_provider: 'FARGATE'
          weight: 50
        - capacity_provider: 'FARGATE_SPOT'
          weight: 50
      deployment_configuration:
        maximum_percent: 150
        minimum_healthy_percent: 75
      placement_constraints:
        - type: 'memberOf'
          expression: 'attribute:instance-type =~ c5.*'
      volume_configurations:
        - name: 'ephemeral-storage'
          managed_ebs_volume:
            role_arn: 'arn:aws:iam::123456789012:role/ecsTaskExecutionRole'
            size_in_gib: 100
            volume_type: 'gp3'
            iops: 3000
            throughput: 125
            encrypted: true
            kms_key_id: 'arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012'
            tag_specifications:
              - resource_type: 'volume'
                propagate_tags: 'SERVICE'
                tags:
                  Name: 'ephemeral-vol'
                  Backup: 'daily'
      network_configuration:
        aws_vpc_configuration:
          subnets:
            - 'subnet-spot123'
          security_groups:
            - 'sg-spot123'
      tags:
        Name: SpotService
        Environment: production
        CostOptimization: spot

stack_tags:
  Test: ecs-service
