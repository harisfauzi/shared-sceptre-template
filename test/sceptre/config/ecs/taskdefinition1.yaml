---
template:
  type: file
  path: ecs/task_definition.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "ECS Task Definitions for test environment"
  task_definitions:
    - name: test1
      family: myapp-task
      cpu: 4096
      memory: 8192
      network_mode: awsvpc
      ipc_mode: none
      pid_mode: task
      requires_compatibilities:
        - FARGATE
        - EC2
      runtime_platform:
        cpu_architecture: X86_64
        operating_system_family: LINUX
      execute_role_arn: "arn:aws:iam::123456789012:role/ecsTaskExecutionRole"
      task_role_arn: "arn:aws:iam::123456789012:role/ecsTaskRole"
      ephemeral_storage:
        size_in_gb: 20
      proxy_configuration:
        type: APPMESH
        container_name: myapp
        proxy_configuration_properties:
          - name: IgnoredUID
            value: "169"
          - name: IgnoredGID
            value: "169"
          - name: AppPorts
            value: "8080,8081"
          - name: ProxyIngressPort
            value: "15000"
          - name: ProxyEgressPort
            value: "15001"
          - name: EgressIgnoredPorts
            value: "22"
          - name: EgressIgnoredIPs
            value: "169.254.170.2,169.254.169.254"
      container_definitions:
        - name: myapp
          image: myapp:latest
          cpu: 2048
          memory: 4096
          essential: true
          disable_networking: false
          interactive: false
          privileged: false
          pseudo_terminal: false
          readonly_root_filesystem: false
          working_directory: /app
          user: appuser:appgroup
          hostname: myapp-container
          command:
            - /app/start.sh
          entry_point:
            - /bin/bash
            - -c
          environment:
            - name: ENVIRONMENT
              value: test
            - name: LOG_LEVEL
              value: INFO
            - name: DB_HOST
              value: db.example.com
          environment_files:
            - type: s3
              value: s3://config-bucket/myapp/config.env
          secrets:
            - name: DB_PASSWORD
              value_from: "'arn:aws:secretsmanager:us-east-1:123456789012:secret:db-password:password::'"
            - name: API_KEY
              value_from: "'arn:aws:secretsmanager:us-east-1:123456789012:secret:api-key:key::'"
          depends_on:
            - container_name: nginx
              condition: HEALTHY
          port_mappings:
            - container_port: 8080
              host_port: 8080
              app_protocol: http
              name: myapp-http
              protocol: tcp
            - container_port: 8443
              host_port: 8443
              app_protocol: https
              protocol: tcp
          mount_points:
            - source_volume: app-logs
              container_path: /var/log/app
              read_only: false
            - source_volume: app-config
              container_path: /etc/app
              read_only: true
          volumes_from:
            - source_container: nginx
              read_only: false
          log_configuration:
            log_driver: awslogs
            options:
              awslogs-group: /ecs/myapp
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
            secret_options:
              - name: datadog_api_key
                value_from: "arn:aws:secretsmanager:us-east-1:123456789012:secret:datadog-api-key"
          health_check:
            command:
              - CMD-SHELL
              - "curl -f http://localhost:8080/health || exit 1"
            interval: 30
            timeout: 5
            retries: 3
            start_period: 60
          linux_parameters:
            init_process_enabled: true
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            devices:
              - host_path: /dev/null
                container_path: /dev/null
                permissions:
                  - read
                  - write
                  - mknod
            tmpfs:
              - container_path: /tmp
                size: 512
                mount_options:
                  - "defaults"
                  - "noexec"
            max_swap: 512
            swappiness: 0
            shared_memory_size: 1024
          docker_labels:
            application: myapp
            version: "1.0"
            team: platform
          docker_security_options:
            - "no-new-privileges"
          ulimits:
            - name: nofile
              soft_limit: 2048
              hard_limit: 8192
          resource_requirements:
            - type: GPU
              value: "1"
            - type: INFERENCE_ACCELERATOR
              value: "inferentia"
          repositories_credentials:
            credentials_parameter: "arn:aws:secretsmanager:us-east-1:123456789012:secret:docker-credentials"
          start_timeout: 60
          stop_timeout: 30
          firelens_configuration:
            type: fluentd
            options:
              Name: service_name
              apikey: "datadog_api_key"
              dd_service: "myapp"
              dd_source: "docker"
          system_controls:
            - namespace: net
              value: ipv4.ip_forward=0
            - namespace: fs
              value: file-max=2097152
          dns_servers:
            - 8.8.8.8
            - 8.8.4.4
          dns_search_domains:
            - example.com
            - internal.example.com
          extra_hosts:
            - hostname: db.local
              ip_address: 10.0.0.5
            - hostname: cache.local
              ip_address: 10.0.0.6
          memory_reservation: 3072
          cpu_shares: 1024
          restart_policy:
            enabled: true
            restart_attempt_period: 300
            ignored_exit_codes:
              - 0
              - 1
        - name: nginx
          image: nginx:latest
          cpu: 256
          memory: 512
          essential: true
          port_mappings:
            - container_port: 80
              host_port: 80
              protocol: tcp
            - container_port: 443
              host_port: 443
              protocol: tcp
          log_configuration:
            log_driver: awslogs
            options:
              awslogs-group: /ecs/nginx
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
          health_check:
            command:
              - CMD
              - wget
              - "--quiet"
              - "--tries=1"
              - "--spider"
              - "http://localhost/health"
            interval: 30
            timeout: 5
            retries: 3
      volumes:
        - name: app-logs
          host:
            source_path: /var/log/app
        - name: app-config
          docker_volume_configuration:
            scope: task
            autoprovision: true
            driver: local
            driver_opts:
              type: tmpfs
              device: tmpfs
            labels:
              app: myapp
              tier: config
      placement_constraints:
        - type: memberOf
          expression: "attribute:ecs.instance-type =~ c5.*"
      tags:
        Name: MyAppTaskDefinition
        Environment: test
        Team: platform
    - name: workertask
      family: worker-task
      cpu: 2048
      memory: 4096
      network_mode: awsvpc
      requires_compatibilities:
        - FARGATE
      execute_role_arn: "arn:aws:iam::123456789012:role/ecsTaskExecutionRole"
      task_role_arn: "arn:aws:iam::123456789012:role/ecsTaskRole"
      container_definitions:
        - name: worker
          image: worker:latest
          memory: 4096
          essential: true
          environment:
            - name: QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/123456789012/myapp-queue"
            - name: MAX_RETRIES
              value: "3"
          log_configuration:
            log_driver: awslogs
            options:
              awslogs-group: /ecs/worker
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
          start_timeout: 120
          stop_timeout: 60
      tags:
        Name: WorkerTaskDefinition
        Environment: test

stack_tags:
  Test: ecs-taskdefinition
