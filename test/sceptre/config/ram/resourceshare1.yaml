---
template:
  type: file
  path: ram/resource_share.yaml.j2

sceptre_user_data:
  description: "RAM Resource Share(s) for {{project_code}}"
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  resource_shares:
    - name: ResourceShareEc2Internal
      allow_external_principals: false
      permission_arns:
        - "arn:aws:ram::aws:permission/ec2:DescribeInstances"
        - "arn:aws:ram::aws:permission/ec2:ModifyInstanceAttribute"
      principals:
        - "arn:aws:iam::123456789012:root"
        - "arn:aws:iam::210987654321:root"
      resource_arns:
        - "arn:aws:ec2:us-east-1:111111111111:instance/i-0123456789abcdef0"
        - "arn:aws:ec2:us-east-1:111111111111:instance/i-0123456789abcdef1"
      tags:
        Environment: "Production"
        Team: "Platform"
        Purpose: "EC2Sharing"
    - name: ResourceShareRdsCluster
      allow_external_principals: true
      permission_arns:
        - "arn:aws:ram::aws:permission/rds:DescribeDBClusters"
        - "arn:aws:ram::aws:permission/rds:DescribeDBInstances"
      principals:
        - "arn:aws:iam::333333333333:root"
        - "arn:aws:iam::444444444444:root"
      resource_arns:
        - "arn:aws:rds:us-east-1:111111111111:cluster:production-cluster"
        - "arn:aws:rds:us-east-1:111111111111:cluster:staging-cluster"
      tags:
        Environment: "Staging"
        Team: "DataEngineering"
        Purpose: "RDSSharing"
    - name: ResourceShareS3Bucket
      allow_external_principals: false
      permission_arns:
        - "arn:aws:ram::aws:permission/s3:GetBucket"
        - "arn:aws:ram::aws:permission/s3:ListBucket"
      principals:
        - "arn:aws:iam::555555555555:root"
      resource_arns:
        - "arn:aws:s3:::shared-analytics-bucket"
        - "arn:aws:s3:::shared-logs-bucket"
      deletion_policy: "Retain"
      update_replace_policy: "Retain"
      tags:
        Environment: "Development"
        Team: "DataAnalytics"
        Purpose: "S3Sharing"
    - name: ResourceShareLambda
      sources:
        - "arn:aws:ram::111111111111:resource-share/12345678-1234-1234-1234-123456789012"
      principals:
        - "arn:aws:iam::666666666666:root"
      tags:
        Environment: "Production"
        Team: "Serverless"
        Purpose: "LambdaSharing"

stack_tags:
  Test: ram-resource-share
