---
template:
  type: file
  path: ecr/repository.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "ECR Repositories for container images"
  repositories:
    - name: ApplicationRepository
      repository_name: my-application
      deletion_policy: Delete
      update_replace_policy: Delete
      empty_on_delete: true
      image_tag_mutability: MUTABLE
      image_scanning_configuration:
        scan_on_push: true
      encryption_configuration:
        encryption_type: AES256
      lifecycle_policy:
        lifecycle_policy_text: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      repository_policy_text_json: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::123456789012:role/CodeBuildRole"
              },
              "Action": [
                "ecr:GetDownloadUrlForLayer",
                "ecr:BatchGetImage",
                "ecr:BatchCheckLayerAvailability",
                "ecr:PutImage",
                "ecr:InitiateLayerUpload",
                "ecr:UploadLayerPart",
                "ecr:CompleteLayerUpload"
              ]
            }
          ]
        }
      tags:
        Environment: production
        Team: platform
        CostCenter: "1234"
        ManagedBy: sceptre

    - name: BaseImageRepository
      repository_name: base-images
      deletion_policy: Retain
      image_tag_mutability: IMMUTABLE
      image_scanning_configuration:
        scan_on_push: true
      encryption_configuration:
        encryption_type: KMS
        kms_key: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      image_tag_mutability_exclusion_filters:
        - image_tag_mutability_exclusion_filter_type: "tagPatternList"
          image_tag_mutability_exclusion_filter_value: "latest,stable"
      tags:
        Environment: shared
        Team: infrastructure

    - name: TestingRepository
      repository_name: testing-builds
      empty_on_delete: false
      image_scanning_configuration:
        scan_on_push: false
      tags:
        Environment: testing
