---
template:
  type: file
  path: appconfig/deployment.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  deployments:
    - name: ExampleDeployment1
      application_id: App1
      configuration_profile_id: ConfigProfile1
      configuration_version: "1.0"
      deployment_strategy_id: Strategy1
      environment_id: Env1
      description: "An example deployment."
      deletion_policy: Retain
      update_replace_policy: Retain
      kms_key_identifier: "arn:aws:kms:region:account-id:key/key-id"
      tags:
        Environment: Production
        Owner: TeamA
      dynamic_extension_parameters:
        - extension_reference: "Extension1"
          parameter_name: "Param1"
          parameter_value: "Value1"
    - name: ExampleDeployment2
      application_id: App2
      configuration_profile_id: ConfigProfile2
      configuration_version: "2.0"
      deployment_strategy_id: Strategy2
      environment_id: Env2
      description: "Another example deployment."
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Environment: Development
        Owner: TeamB
