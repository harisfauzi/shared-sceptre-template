---
template:
  type: file
  path: config/configuration_recorder.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "AWS Config Configuration Recorder(s) for testing purposes"
  configuration_recorders:
    - name: DefaultRecorder
      configuration_recorder_name: default-recorder
      deletion_policy: Delete
      update_replace_policy: Delete
      role_arn: arn:aws:iam::123456789012:role/ConfigRecorderRole
      recording_group:
        all_supported: true
        include_global_resource_types: true

    - name: Ec2SpecificRecorder
      configuration_recorder_name: ec2-specific-recorder
      deletion_policy: Delete
      update_replace_policy: Delete
      role_arn: arn:aws:iam::123456789012:role/ConfigRecorderRole
      recording_group:
        all_supported: false
        resource_types:
          - AWS::EC2::Instance
          - AWS::EC2::SecurityGroup
          - AWS::EC2::NetworkInterface
          - AWS::EC2::Volume

    - name: ExclusionRecorder
      configuration_recorder_name: exclusion-recorder
      deletion_policy: Delete
      update_replace_policy: Delete
      role_arn: arn:aws:iam::123456789012:role/ConfigRecorderRole
      recording_group:
        all_supported: true
        exclusion_by_resource_types:
          resource_types:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance

    - name: FrequencyBasedRecorder
      configuration_recorder_name: frequency-based-recorder
      deletion_policy: Delete
      update_replace_policy: Delete
      role_arn: arn:aws:iam::123456789012:role/ConfigRecorderRole
      recording_group:
        all_supported: true
        include_global_resource_types: true
      recording_mode:
        recording_frequency: CONTINUOUS
        recording_mode_overrides:
          - recording_frequency: DAILY
            resource_types:
              - AWS::RDS::DBInstance
              - AWS::RDS::DBCluster
            description: "Record RDS resources daily for cost optimization"
          - recording_frequency: CONTINUOUS
            resource_types:
              - AWS::EC2::SecurityGroup
              - AWS::IAM::Policy
            description: "Record security-critical resources continuously"

    - name: OrganizationCentralRecorder
      configuration_recorder_name: organization-central-recorder
      deletion_policy: Retain
      update_replace_policy: Retain
      role_arn: arn:aws:iam::123456789012:role/OrganizationConfigRecorderRole
      recording_group:
        all_supported: true
        include_global_resource_types: true
        recording_strategy:
          use_only: ORGANISATIONS_STT
      recording_mode:
        recording_frequency: CONTINUOUS
