---
template:
  type: file
  path: config/conformance_pack.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "AWS Config Conformance Pack(s) for testing purposes"
  conformance_packs:
    - name: PciDssConformancePack
      conformance_pack_name: pci-dss-conformance-pack
      deletion_policy: Delete
      update_replace_policy: Delete
      template_s3_uri: s3://aws-config-conforms-packs-123456789012-us-east-1/conformance-packs/PCI-DSS.json
      delivery_s3_bucket: my-config-bucket
      delivery_s3_key_prefix: conformance-packs/pci-dss/

    - name: SecurityBestPracticesPack
      conformance_pack_name: security-best-practices-pack
      deletion_policy: Delete
      update_replace_policy: Delete
      template_s3_uri: s3://aws-config-conforms-packs-123456789012-us-east-1/conformance-packs/SECURITY_BEST_PRACTICES.json
      conformance_pack_input_parameters:
        - parameter_name: RestrictedSshPort
          parameter_value: "22"
        - parameter_name: RestrictedRdpPort
          parameter_value: "3389"
        - parameter_name: AccessLoggingBucket
          parameter_value: my-access-logs-bucket

    - name: InlineTemplateConformancePack
      conformance_pack_name: inline-template-pack
      deletion_policy: Delete
      update_replace_policy: Delete
      delivery_s3_bucket: my-config-bucket
      delivery_s3_key_prefix: conformance-packs/inline/
      template_body: |-
        {
          "Resources": {
            "AcmCertificateExpirationCheck": {
              "Type": "AWS::Config::ConfigRule",
              "Properties": {
                "ConfigRuleName": "acm-certificate-expiration-check",
                "Description": "Checks if ACM certificates expire within specified days",
                "Source": {
                  "Owner": "AWS",
                  "SourceIdentifier": "ACM_CERTIFICATE_EXPIRATION_CHECK"
                },
                "InputParameters": {
                  "daysToExpiration": "30"
                }
              }
            }
          }
        }

    - name: SsmDocumentConformancePack
      conformance_pack_name: ssm-document-pack
      deletion_policy: Delete
      update_replace_policy: Delete
      template_ssm_document_details:
        document_name: AWS-ConfigConforms-SecurityBestPracticesPackV1
        document_version: "1"
      delivery_s3_bucket: my-config-bucket
      delivery_s3_key_prefix: conformance-packs/ssm/

    - name: ComprehensiveComplexPack
      conformance_pack_name: comprehensive-complex-pack
      deletion_policy: Retain
      update_replace_policy: Retain
      template_s3_uri: s3://aws-config-conforms-packs-123456789012-us-east-1/conformance-packs/ENTERPRISE_CONTROLS.json
      delivery_s3_bucket: my-config-bucket
      delivery_s3_key_prefix: conformance-packs/enterprise/
      conformance_pack_input_parameters:
        - parameter_name: CidrBlock
          parameter_value: "10.0.0.0/8"
        - parameter_name: MaximumAcceptableRotationDays
          parameter_value: "90"
        - parameter_name: RequiredTagKey
          parameter_value: CostCenter
        - parameter_name: RequiredTagValue
          parameter_value: Engineering
        - parameter_name: AllowedRegions
          parameter_value: "us-east-1,us-west-2,eu-west-1"
