---
template:
  type: file
  path: config/remediation_configuration.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "AWS Config Remediation Configuration(s) for testing purposes"
  remediation_configurations:
    - name: S3BucketVersioningRemediation
      config_rule_name: s3-bucket-versioning-enabled
      target_id: AWS-EnableS3BucketVersioning
      target_type: SSM_DOCUMENT
      deletion_policy: Delete
      update_replace_policy: Delete
      automatic: false
      resource_type: AWS::S3::Bucket
      target_version: "1"

    - name: SecurityGroupRemediationAutomaticWithControls
      config_rule_name: restricted-ssh
      target_id: AWS-RevokeUnauthorizedIngressRules
      target_type: SSM_DOCUMENT
      deletion_policy: Delete
      update_replace_policy: Delete
      automatic: true
      resource_type: AWS::EC2::SecurityGroup
      maximum_automatic_attempts: 10
      retry_attempt_seconds: 60
      execution_controls:
        ssm_controls:
          concurrent_execution_rate_percentage: 50
          error_percentage: 25
      parameters: |-
        IpProtocol: '-1'
        CidrBlock: 0.0.0.0/0

    - name: IamAccessKeyRotationRemediation
      config_rule_name: iam-accesskey-rotation
      target_id: AWS-RotateAccessKey
      target_type: SSM_DOCUMENT
      deletion_policy: Delete
      update_replace_policy: Delete
      automatic: true
      maximum_automatic_attempts: 5
      retry_attempt_seconds: 120
      target_version: "2"

    - name: RdsEncryptionRemediation
      config_rule_name: rds-storage-encrypted
      target_id: AWS-EnableRdsEncryption
      target_type: SSM_DOCUMENT
      deletion_policy: Retain
      update_replace_policy: Retain
      automatic: true
      resource_type: AWS::RDS::DBInstance
      maximum_automatic_attempts: 3
      retry_attempt_seconds: 300
      execution_controls:
        ssm_controls:
          concurrent_execution_rate_percentage: 25
          error_percentage: 10
      parameters: |-
        KmsKeyId: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012

    - name: TagComplianceRemediation
      config_rule_name: required-tags
      target_id: AWS-TagResource
      target_type: SSM_DOCUMENT
      deletion_policy: Delete
      update_replace_policy: Delete
      automatic: false
      maximum_automatic_attempts: 1
      retry_attempt_seconds: 30
      parameters: |-
        Tags: "Environment=Production,Owner=CloudOps"
