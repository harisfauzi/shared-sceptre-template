---
template:
  type: file
  path: config/config_rule.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "AWS Config Rule(s) for testing purposes"
  config_rules:
    - name: S3PublicReadProhibited
      config_rule_name: s3-bucket-public-read-prohibited
      description: Checks that S3 buckets do not allow public read access
      deletion_policy: Delete
      update_replace_policy: Delete
      source:
        owner: AWS
        source_identifier: S3_BUCKET_PUBLIC_READ_PROHIBITED
        source_details:
          - message_type: ConfigurationItemChangeNotification
          - message_type: OversizedChangeNotification
      scope:
        compliance_resource_types:
          - AWS::S3::Bucket
      maximum_execution_frequency: TwentyFour_Hours

    - name: IamPolicyBlacklistedCheck
      config_rule_name: iam-policy-blacklisted-check
      description: Checks for blacklisted IAM policy actions
      deletion_policy: Delete
      update_replace_policy: Delete
      source:
        owner: AWS
        source_identifier: IAM_POLICY_BLACKLISTED_CHECK
        source_details:
          - message_type: ConfigurationItemChangeNotification
      input_parameters_json: |-
        {
          "policyArns": "arn:aws:iam::aws:policy/AdministratorAccess"
        }
      evaluation_modes:
        - mode: DETECTIVE

    - name: TagComplianceCheck
      config_rule_name: tag-compliance-check
      description: Checks for required tags on EC2 instances
      deletion_policy: Delete
      update_replace_policy: Delete
      source:
        owner: AWS
        source_identifier: REQUIRED_TAGS
        source_details:
          - message_type: ConfigurationItemChangeNotification
            maximum_execution_frequency: TwentyFour_Hours
      scope:
        compliance_resource_types:
          - AWS::EC2::Instance
      input_parameters: |-
        tag1Key: Environment
        tag2Key: Owner
        tag3Key: CostCenter

    - name: CustomPolicyRuleCompliance
      config_rule_name: custom-policy-rule-compliance
      description: Custom policy rule using Lambda for compliance evaluation
      deletion_policy: Retain
      update_replace_policy: Retain
      source:
        owner: CUSTOM_POLICY
        custom_policy_details:
          policy_text: |-
            {
              "ResourceType": "AWS::EC2::SecurityGroup",
              "ResourceIdTemplate": "arn:partition:ec2:region:account-id:security-group/sg-*",
              "ComplianceResourceTypes": ["AWS::EC2::SecurityGroup"],
              "Conditions": {
                "Properties": {
                  "GroupIngressRules[*].IpProtocol": ["tcp"],
                  "GroupIngressRules[*].FromPort": [22]
                }
              },
              "Evaluation": {
                "ComplianceType": "NON_COMPLIANT",
                "OrderingTimestamp": "2020-04-14T21:43:00Z"
              }
            }
          policy_runtime: guard-2.0.0
          enable_debug_log_delivery: true
      evaluation_modes:
        - mode: DETECTIVE
        - mode: PROACTIVE
      compliance:
        type: COMPLIANT

    - name: RdsEncryptionCheck
      config_rule_name: rds-encryption-enabled
      description: Checks if RDS instances have encryption enabled
      deletion_policy: Delete
      update_replace_policy: Delete
      source:
        owner: AWS
        source_identifier: RDS_STORAGE_ENCRYPTED
        source_details:
          - message_type: ConfigurationItemChangeNotification
      scope:
        compliance_resource_types:
          - AWS::RDS::DBInstance
      maximum_execution_frequency: TwentyFour_Hours
