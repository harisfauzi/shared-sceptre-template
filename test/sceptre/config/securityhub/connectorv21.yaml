---
template:
  type: file
  path: securityhub/connector_v2.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecurityHub Connector V2(s) for testing purposes"
  connector_v2s:
    - name: JiraCloudConnector
      deletion_policy: Delete
      update_replace_policy: Delete
      connector_v2_name: "SecurityHub-Jira-Cloud-Connector"
      description: "Connector for Jira Cloud integration with SecurityHub"
      provider:
        jira_cloud:
          project_key: "SECOPS"
      tags:
        Application: "SecurityHub"
        IntegrationType: "Jira"
        Environment: "Production"

    - name: ServiceNowConnector
      deletion_policy: Delete
      update_replace_policy: Delete
      connector_v2_name: "SecurityHub-ServiceNow-Connector"
      description: "Connector for ServiceNow integration with SecurityHub"
      provider:
        service_now:
          instance_name: "dev12345.service-now.com"
          secret_arn: "arn:aws:secretsmanager:us-east-1:123456789012:secret:servicenow-credentials-AbCdEf"
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      tags:
        Application: "SecurityHub"
        IntegrationType: "ServiceNow"
        Team: "Operations"

    - name: JiraCloudSecurityTeam
      deletion_policy: Delete
      update_replace_policy: Delete
      connector_v2_name: "SecurityHub-Jira-Security-Team"
      provider:
        jira_cloud:
          project_key: "SECURITY"
      tags:
        Application: "SecurityHub"
        IntegrationType: "Jira"
        Team: "Security"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: securityhub-connector-v2
