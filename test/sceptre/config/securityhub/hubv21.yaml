---
template:
  type: file
  path: securityhub/hub_v2.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecurityHub Hub V2(s) for testing purposes"
  hub_v2s:
    - name: PrimarySecurityHub
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Application: "SecurityHub"
        Environment: "Production"
        CostCenter: "Security"

    - name: DevelopmentSecurityHub
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Application: "SecurityHub"
        Environment: "Development"
        Team: "Security"

    - name: StagingSecurityHub
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Application: "SecurityHub"
        Environment: "Staging"
        Purpose: "Testing"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: securityhub-hub-v2
