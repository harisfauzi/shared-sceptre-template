---
template:
  type: file
  path: securityhub/finding_aggregator.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecurityHub Finding Aggregator(s) for testing purposes"
  finding_aggregators:
    - name: AllRegionsAggregator
      deletion_policy: Delete
      update_replace_policy: Delete
      region_linking_mode: "ALL_REGIONS"

    - name: SpecificRegionsAggregator
      deletion_policy: Delete
      update_replace_policy: Delete
      region_linking_mode: "SPECIFIED_REGIONS"
      regions:
        - us-east-1
        - us-west-2
        - eu-west-1
        - ap-southeast-1

    - name: NorthAmericaAggregator
      deletion_policy: Delete
      update_replace_policy: Delete
      region_linking_mode: "SPECIFIED_REGIONS"
      regions:
        - us-east-1
        - us-west-2
        - ca-central-1

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: securityhub-finding-aggregator
