---
template:
  type: file
  path: logs/delivery-source.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "Delivery Sources for CloudWatch Logs"
  delivery_sources:
    - name: VPCFlowLogsSource
      delivery_source_name: vpc-flow-logs-source-prod
      log_type: VPC_FLOW
      resource_arn: "arn:aws:ec2:us-west-2:123456789012:*"
      tags:
        Environment: Production
        Service: VPC
        CostCenter: Infrastructure

    - name: RDSLogsSource
      delivery_source_name: rds-logs-source-prod
      log_type: RDS_INSTANCE
      resource_arn: "arn:aws:rds:us-west-2:123456789012:db:prod-database"
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Database: PostgreSQL
        Team: DataEngineering

    - name: LambdaLogsSource
      delivery_source_name: lambda-logs-source-prod
      log_type: LAMBDA_FUNCTION
      tags:
        Environment: Production
        Runtime: Python3.11

stack_tags:
  Test: logs-delivery-source
