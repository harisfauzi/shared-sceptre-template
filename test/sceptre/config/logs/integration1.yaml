---
template:
  type: file
  path: logs/integration.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "CloudWatch Logs Integrations"
  deliveries:
    - name: OpenSearchIntegration
      integration_name: opensearch-integration-prod
      integration_type: OPENSEARCH
      resource_config:
        open_search_resource_config:
          dashboard_viewer_principals:
            - "arn:aws:iam::123456789012:role/CloudWatchLogsViewerRole"
            - "arn:aws:iam::123456789012:user/developer@example.com"
          data_source_role_arn: "arn:aws:iam::123456789012:role/CloudWatchLogsOpenSearchRole"
          application_arn: "arn:aws:aos:us-west-2:123456789012:domain/cloudwatch-logs"
          kms_key_arn: "arn:aws:kms:us-west-2:123456789012:key/12345678-1234-1234-1234-123456789012"
          retention_days: 30
      tags:
        Environment: Production
        Service: OpenSearch
        CostCenter: Analysis

    - name: SumoLogicIntegration
      integration_name: sumologic-integration-prod
      integration_type: SUMOLOGIC
      resource_config:
        open_search_resource_config:
          dashboard_viewer_principals:
            - "arn:aws:iam::123456789012:role/SumoLogicViewerRole"
          data_source_role_arn: "arn:aws:iam::123456789012:role/CloudWatchLogsSumoLogicRole"
          retention_days: 7
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Service: SumoLogic
        Team: ObservabilityEng

    - name: DatadogIntegration
      integration_name: datadog-integration-prod
      integration_type: DATADOG
      resource_config:
        open_search_resource_config:
          dashboard_viewer_principals:
            - "arn:aws:iam::123456789012:role/DatadogMonitoringRole"
          data_source_role_arn: "arn:aws:iam::123456789012:role/CloudWatchLogsDatadogRole"
      tags:
        Environment: Production
        Service: Datadog

stack_tags:
  Test: logs-integration
