---
template:
  type: file
  path: logs/log-anomaly-detector.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "CloudWatch Logs Anomaly Detectors"
  log_anomaly_detectors:
    - name: ApplicationErrorAnomalyDetector
      detector_name: app-error-anomaly-detector-prod
      account_id: "123456789012"
      evaluation_frequency: FIVE_MIN
      anomaly_visibility_time: 4
      filter_pattern: "'[...]'"
      log_group_arn_list:
        - "arn:aws:logs:us-west-2:123456789012:log-group:/aws/lambda/app-function-prod:*"
        - "arn:aws:logs:us-west-2:123456789012:log-group:/aws/ecs/app-service-prod:*"
      kms_key_id: "arn:aws:kms:us-west-2:123456789012:key/12345678-1234-1234-1234-123456789012"
      tags:
        Environment: Production
        Service: Application
        CostCenter: Engineering

    - name: DatabasePerformanceAnomalyDetector
      detector_name: db-performance-anomaly-detector-prod
      evaluation_frequency: TEN_MIN
      anomaly_visibility_time: 2
      filter_pattern: "'{ $.response_time > 1000 }'"
      log_group_arn_list:
        - "arn:aws:logs:us-west-2:123456789012:log-group:/aws/rds/db-instance-prod:*"
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Database: PostgreSQL
        Team: DataEngineering

    - name: APIGatewayAnomalyDetector
      detector_name: api-gateway-anomaly-detector-prod
      log_group_arn_list:
        - "arn:aws:logs:us-west-2:123456789012:log-group:/aws/apigateway/prod-api:*"
      tags:
        Environment: Production
        Service: APIGateway

stack_tags:
  Test: logs-anomaly-detector
