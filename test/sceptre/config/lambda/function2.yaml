---
template:
  type: file
  path: lambda/function.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Lambda Functions for {{project_code}}
  functions:
    - name: ProductionDataProcessor
      function_name: prod-data-processor
      role: "arn:aws:iam::123456789012:role/lambda-execution-role"
      runtime: python3.11
      handler: index.lambda_handler
      timeout: 300
      memory_size: 512
      reserved_concurrent_execution: 100
      code:
        s3_bucket: lambda-code-bucket
        s3_key: functions/data-processor.zip
        s3_object_version: abc123def456
      architectures:
        - x86_64
      layers:
        - "arn:aws:lambda:us-east-1:123456789012:layer:python-dependencies:5"
        - "arn:aws:lambda:us-east-1:123456789012:layer:common-utilities:2"
      environment:
        variables:
          ENVIRONMENT: production
          LOG_LEVEL: INFO
          DATABASE_URL: "arn:secretsmanager:us-east-1:123456789012:secret:prod/db"
      vpc_config:
        subnet_ids:
          - subnet-12345678
          - subnet-87654321
        security_group_ids:
          - sg-12345678
          - sg-87654321
        ipv6_allowed_for_dual_stack: false
      tracing_config:
        mode: Active
      logging_config:
        log_format: JSON
        application_log_level: INFO
        system_log_level: WARNING
        log_group: /aws/lambda/prod-data-processor
      dead_letter_config:
        target_arn: "arn:aws:sqs:us-east-1:123456789012:dlq-failed-events"
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      ephemeral_storage:
        size: 512
      file_system_configs:
        - arn: "arn:aws:elasticfilesystem:us-east-1:123456789012:access-point/fsap-12345678"
          local_mounth_path: /mnt/efs
      tags:
        Environment: Production
        Team: DataEngineering
        Application: DataProcessor
    - name: DevelopmentFunction
      function_name: dev-inline-function
      role: "arn:aws:iam::123456789012:role/lambda-dev-role"
      runtime: python3.11
      handler: index.handler
      timeout: 60
      memory_size: 128
      code:
        zip_file: |
          import json
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps('Hello from Lambda!')
              }
      description: Development inline Lambda function
      package_type: Zip
      environment:
        variables:
          ENVIRONMENT: development
      snap_start:
        apply_on: PublishedVersions
      tags:
        Environment: Development
        Team: Platform
    - name: ContainerFunction
      function_name: prod-container-processor
      role: "arn:aws:iam::123456789012:role/lambda-container-role"
      timeout: 120
      memory_size: 1024
      code:
        image_uri: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lambda-processor:latest"
      package_type: Image
      image_config:
        entry_point:
          - /app/entry.sh
        command:
          - handler.main
        working_directory: /app
      architectures:
        - x86_64
        - arm64
      function_scaling_config:
        min_execution_environments: 1
        max_execution_environments: 100
      runtime_management_config:
        update_runtime_on: FunctionUpdate
        runtime_version_arn: "arn:aws:lambda:us-east-1::runtime:provided.al2:1"
      publish_to_latest_published: true
      tags:
        Environment: Production
        Team: Platform
        ContainerImage: true
