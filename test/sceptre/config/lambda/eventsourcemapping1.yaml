---
template:
  type: file
  path: lambda/event_source_mapping.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Lambda Event Source Mappings for {{project_code}}
  event_source_mappings:
    - name: KinesisEventSourceMapping
      function_name: kinesis-processor
      event_source_arn: "arn:aws:kinesis:us-east-1:123456789012:stream/prod-events"
      enabled: true
      starting_position: LATEST
      batch_size: 100
      maximum_batching_window_in_seconds: 5
      parallelization_factor: 10
      maximum_record_age_in_seconds: 3600
      maximum_retry_attempts: 2
      bisect_batch_on_function_error: true
      destination_config:
        on_failure:
          destination: "arn:aws:sqs:us-east-1:123456789012:kinesis-failed-records"
      function_response_types:
        - ReportBatchItemFailures
      tumbling_window_in_seconds: 0
      logging_config:
        system_log_level: DEBUG
      metrics_config:
        metrics:
          - EventCount
          - EventAge
          - Util
      filter_criteria:
        filters:
          - pattern: '{"status": "active"}'
      tags:
        EventSource: Kinesis
        Environment: Production
    - name: DynamoDBEventSourceMapping
      function_name: dynamodb-processor
      event_source_arn: "arn:aws:dynamodb:us-east-1:123456789012:table/OrderTable/stream/2023-06-01T00:00:00.000"
      enabled: true
      starting_position: NEW_IMAGE
      batch_size: 200
      maximum_record_age_in_seconds: 7200
      maximum_retry_attempts: 1
      document_db_event_source_config:
        database_name: production
        collection_name: orders
        full_document: UpdateLookup
      provisioned_poller_config:
        minimum_pollers: 1
        maximum_pollers: 10
        poller_group_name: dynamodb-pollers
      scaling_config:
        maximum_concurrency: 100
      tags:
        EventSource: DynamoDB
        Environment: Production
        Application: OrderProcessing
    - name: SqsEventSourceMapping
      function_name: sqs-consumer
      event_source_arn: "arn:aws:sqs:us-east-1:123456789012:message-queue"
      enabled: true
      batch_size: 10
      maximum_batching_window_in_seconds: 10
      queues:
        - message-queue
        - priority-queue
      source_access_configurations:
        - type: BASIC_AUTH
          uri: "arn:secretsmanager:us-east-1:123456789012:secret:sqs/credentials"
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      tags:
        EventSource: SQS
        Environment: Production
