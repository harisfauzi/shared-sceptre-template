---
template:
  type: file
  path: lambda/network_connector.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Lambda Network Connectors for {{project_code}}
  network_connectors:
    - name: ProductionNetworkConnector
      network_connector_name: prod-lambda-network-connector
      configuration:
        vpc_egress_configuration:
          associated_compute_resource_types:
            - Lambda
            - LambdaSnapStart
          network_protocol: TCP
          subnet_ids:
            - subnet-12345678
            - subnet-87654321
          security_group_ids:
            - sg-12345678
            - sg-87654321
      operator_role: "arn:aws:iam::123456789012:role/LambdaNetworkConnectorOperator"
      tags:
        Environment: Production
        Team: Networking
        Application: LambdaConnector
      deletion_policy: Retain
      update_replace_policy: Retain
    - name: DevelopmentNetworkConnector
      network_connector_name: dev-lambda-network-connector
      configuration:
        vpc_egress_configuration:
          associated_compute_resource_types:
            - Lambda
          network_protocol: TCP
          subnet_ids:
            - subnet-dev12345
            - subnet-dev54321
      tags:
        Environment: Development
        Team: Networking
    - name: StagingNetworkConnector
      configuration:
        vpc_egress_configuration:
          associated_compute_resource_types:
            - Lambda
            - LambdaSnapStart
          network_protocol: UDP
          subnet_ids:
            - subnet-stage123
            - subnet-stage456
            - subnet-stage789
          security_group_ids:
            - sg-staging123
      operator_role: "arn:aws:iam::123456789012:role/StagingNetworkOperator"
