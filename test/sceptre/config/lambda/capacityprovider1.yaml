---
template:
  type: file
  path: lambda/capacity_provider.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Lambda Capacity Providers for {{project_code}}
  capacity_provideres:
    - name: ProductionCapacityProvider
      capacity_provider_name: prod-lambda-capacity-provider
      permissions_config:
        capacity_provider_operator_role_arn: "arn:aws:iam::123456789012:role/lambda-capacity-provider-operator"
      vpc_config:
        security_group_ids:
          - sg-12345678
          - sg-87654321
        subnet_ids:
          - subnet-12345678
          - subnet-87654321
          - subnet-abcdefgh
      capacity_provider_scaling_config:
        max_vcpu_count: 1000
        scaling_mode: PROVISIONED
        scaling_policies:
          - predefined_metric_type: LambdaProvisionedConcurrencyUtilization
            target_value: 0.75
      instance_requirements:
        allowed_instance_types:
          - t3.medium
          - t3.large
          - m5.large
        architectures:
          - x86_64
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      propagate_tags:
        mode: SERVICE
        explicit_tags:
          Environment: Production
          Team: Lambda
      telemetry_config:
        logging_config:
          log_group: /aws/lambda/capacity-provider
          system_log_level: INFO
      tags:
        Environment: Production
        Team: Platform
        Application: Lambda
    - name: StagingCapacityProvider
      capacity_provider_name: staging-lambda-capacity-provider
      permissions_config:
        capacity_provider_operator_role_arn: "arn:aws:iam::123456789012:role/staging-lambda-operator"
      vpc_config:
        security_group_ids:
          - sg-staging01
        subnet_ids:
          - subnet-staging01
          - subnet-staging02
      capacity_provider_scaling_config:
        max_vcpu_count: 500
        scaling_mode: PROVISIONED
        scaling_policies:
          - predefined_metric_type: LambdaProvisionedConcurrencyUtilization
            target_value: 0.70
          - predefined_metric_type: LambdaProvisionedConcurrentExecutionUtilization
            target_value: 0.65
      instance_requirements:
        architectures:
          - x86_64
          - arm64
        excluded_instance_types:
          - t2.micro
          - t2.small
      tags:
        Environment: Staging
        Team: Platform
