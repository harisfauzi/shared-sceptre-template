---
template:
  type: file
  path: lambda/version.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Lambda Versions for {{project_code}}
  versions:
    - name: ProductionDataProcessorVersion
      function_name: data-processor-function
      code_sha256: "abc123def456ghi789jkl012mno345pqr678stu"
      description: Production version with provisioned concurrency and runtime policy
      provisioned_concurrency_configuration:
        provisioned_concurrent_executions: 100
      runtime_policy:
        update_runtime_on: FunctionUpdate
        runtime_version_arn: "arn:aws:lambda:us-east-1::runtime:provided.al2:1"
      deletion_policy: Retain
      update_replace_policy: Retain
    - name: DevelopmentVersion
      function_name: dev-test-function
      code_sha256: "xyz789uvw012abc345def678ghi901jkl234mno"
      description: Development version with minimal configuration
    - name: StagingVersion
      function_name: staging-api-handler
      description: Staging version with function scaling config
      function_scaling_config:
        max_execution_environments: 50
        min_execution_environments: 5
      provisioned_concurrency_configuration:
        provisioned_concurrent_executions: 25
