---
template:
  type: file
  path: wafv2/logging_configuration.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "WAFv2 Logging Configuration(s)"
  logging_configurations:
    - name: RegionalWebAclLogging
      log_destination_configs:
        - "arn:aws:logs:us-east-1:123456789012:log-group:/aws/wafv2/regional-web-acl"
      resource_arn: "arn:aws:wafv2:us-east-1:123456789012:regional/webacl/test-web-acl/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      deletion_policy: "Delete"
      logging_filter:
        default_behavior: "KEEP"
        filters:
          - behavior: "KEEP"
            conditions:
              - action_condition:
                  action: "BLOCK"
            requirement: "MEETS_ANY"

    - name: CloudFrontDistributionLogging
      log_destination_configs:
        - "arn:aws:logs:us-east-1:123456789012:log-group:/aws/wafv2/cloudfront-acl"
      resource_arn: "arn:aws:wafv2:us-east-1:123456789012:global/webacl/cf-web-acl/a1b2c3d4-e5f6-7890-abcd-ef1234567891"
      deletion_policy: "Retain"
      update_replace_policy: "Retain"
      redacted_fields:
        - single_header:
            name: "Authorization"
        - query_string_json: "{}"
        - uri_path_json: "{}"

    - name: LoggingWithMultipleDestinations
      log_destination_configs:
        - "arn:aws:logs:us-east-1:123456789012:log-group:/aws/wafv2/primary-logs"
        - "arn:aws:kinesis:us-east-1:123456789012:stream/waf-stream"
      resource_arn: "arn:aws:wafv2:us-east-1:123456789012:regional/webacl/multi-dest-acl/a1b2c3d4-e5f6-7890-abcd-ef1234567892"
      logging_filter:
        default_behavior: "DROP"
        filters:
          - behavior: "KEEP"
            conditions:
              - label_name_condition:
                  label_name: "awswaf:managed:aws:core-rule-set:SQLiProtection_SQLI"
            requirement: "MEETS_ALL"
          - behavior: "DROP"
            conditions:
              - action_condition:
                  action: "ALLOW"
            requirement: "MEETS_ANY"

stack_tags:
  Test: wafv2-logging
