---
template:
  type: file
  path: inspector/assessment_target.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Inspector Assessment Targets for {{project_code}}
  assessment_targets:
    - name: ProductionTarget
      assessment_target_name: prod-assessment-target
      resource_group_arn: "!Sub arn:aws:inspector:${AWS::Region}:${AWS::AccountId}:resourcegroup/1"
    - name: StagingTarget
      assessment_target_name: staging-assessment-target
      resource_group_arn: "!Sub arn:aws:inspector:${AWS::Region}:${AWS::AccountId}:resourcegroup/2"

stack_tags:
  Test: inspector-assementtarget
