---
template:
  type: file
  path: dms/replication_instance.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS DMS Replication Instances for Database Migration and Continuous Replication
  replication_instances:
    - name: ProductionReplicationInstance
      replication_instance_identifier: prod-replication-instance-001
      replication_instance_class: dms.c6i.4xlarge
      allocated_storage: 500
      engine_version: "3.4.7"
      availability_zone: us-east-1a
      multi_az: true
      publicly_accessible: false
      auto_minor_version_upgrade: true
      allow_major_version_upgrade: false
      network_type: IPV4
      replication_subnet_group_identifier: dms-subnet-group-prod
      kms_key_id: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012
      vpc_security_group_ids:
        - sg-0123456789abcdef0
        - sg-0987654321fedcba0
      preferred_maintenace_window: sun:03:00-sun:04:00
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Performance: HighThroughput
        ReplicationRole: Primary
        Owner: DataEngineering
        CostCenter: Infrastructure
        DataClassification: Confidential

    - name: StagingReplicationInstance
      replication_instance_identifier: staging-replication-instance-002
      replication_instance_class: dms.c6i.2xlarge
      allocated_storage: 250
      engine_version: "3.4.7"
      availability_zone: us-east-1b
      multi_az: true
      publicly_accessible: false
      auto_minor_version_upgrade: true
      allow_major_version_upgrade: false
      replication_subnet_group_identifier: dms-subnet-group-staging
      vpc_security_group_ids:
        - sg-0abcdef0123456789
      preferred_maintenace_window: sat:02:00-sat:03:00
      deletion_policy: Delete
      tags:
        Environment: Staging
        Performance: Standard
        Purpose: Testing

    - name: DevelopmentReplicationInstance
      replication_instance_identifier: dev-replication-instance-003
      replication_instance_class: dms.t3.large
      allocated_storage: 100
      availability_zone: us-east-1c
      multi_az: false
      publicly_accessible: true
      auto_minor_version_upgrade: true
      replication_subnet_group_identifier: dms-subnet-group-dev
      vpc_security_group_ids:
        - sg-0fedcba9876543210
      deletion_policy: Delete
      tags:
        Environment: Development
        Performance: Basic
        DataClassification: Internal

    - name: DisasterRecoveryReplicationInstance
      replication_instance_identifier: dr-replication-instance-004
      replication_instance_class: dms.c6i.4xlarge
      allocated_storage: 500
      engine_version: "3.4.7"
      availability_zone: us-east-1a
      multi_az: true
      publicly_accessible: false
      auto_minor_version_upgrade: false
      allow_major_version_upgrade: false
      network_type: IPV4
      replication_subnet_group_identifier: dms-subnet-group-dr
      kms_key_id: arn:aws:kms:us-east-1:123456789012:key/87654321-4321-4321-4321-210987654321
      vpc_security_group_ids:
        - sg-0123456789abcdef1
        - sg-0987654321fedcba1
        - sg-0abcdef0123456781
      preferred_maintenace_window: sun:01:00-sun:02:00
      resource_identifier: dr-replication-custom-id
      deletion_policy: Retain
      tags:
        Environment: Production
        Purpose: DisasterRecovery
        Critical: "true"
        RPO: "1-hour"
        RTO: "4-hours"
        Owner: DBAdmins

    - name: TestReplicationInstance
      replication_instance_identifier: test-replication-instance-005
      replication_instance_class: dms.t3.medium
      publicly_accessible: true
      deletion_policy: Delete
      tags:
        Environment: Testing
        Temporary: "true"

stack_tags:
  Test: dms-replication-instance
