---
template:
  type: file
  path: dms/data_provider.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS DMS Data Providers for Database Connectivity
  data_providers:
    - name: PostgresSourceProvider
      engine: postgres
      data_provider_identifier: postgres-source-provider-001
      data_provider_name: PostgreSQL Source Database
      description: Source PostgreSQL database provider for production migration
      exact_settings: false
      deletion_policy: Delete
      update_replace_policy: Delete
      settings:
        postgre_sql_settings:
          server_name: source-postgres.example.com
          port: 5432
          database_name: source_migration_db
          ssl_mode: require
          certificate_arn: arn:aws:secretsmanager:us-east-1:123456789012:secret:postgres-cert-abc123
      tags:
        Environment: Production
        DatabaseType: PostgreSQL
        Role: Source

    - name: MysqlTargetProvider
      engine: mysql
      data_provider_identifier: mysql-target-provider-002
      data_provider_name: MySQL Target Database
      deletion_policy: Delete
      settings:
        my_sql_settings:
          server_name: target-mysql.example.com
          port: 3306
          ssl_mode: require
          certificate_arn: arn:aws:secretsmanager:us-east-1:123456789012:secret:mysql-cert-xyz789
      tags:
        Environment: Staging
        DatabaseType: MySQL
        Role: Target

    - name: OracleDataProvider
      engine: oracle
      data_provider_identifier: oracle-provider-003
      data_provider_name: Oracle Enterprise Database
      description: Oracle database provider with advanced security settings
      settings:
        oracle_settings:
          server_name: oracle-db.example.com
          port: 1521
          database_name: ORCL
          ssl_mode: require
          asm_server: asm-server.example.com
          certificate_arn: arn:aws:secretsmanager:us-east-1:123456789012:secret:oracle-cert-def456
          secrets_manager_oracle_asm_access_role_arn: arn:aws:iam::123456789012:role/dms-oracle-asm-role
          secrets_manager_oracle_asm_secret_id: oracle-asm-credentials
          secrets_manager_security_db_encryption_access_role_arn: arn:aws:iam::123456789012:role/dms-oracle-encryption-role
          secrets_manager_security_db_encryption_secret_id: oracle-tde-credentials
      tags:
        Environment: Production
        DatabaseType: Oracle
        Critical: "true"

    - name: MongoDbProvider
      engine: mongodb
      data_provider_identifier: mongodb-provider-004
      data_provider_name: MongoDB Document Database
      settings:
        mongo_db_settings:
          server_name: mongo-cluster.example.com
          port: 27017
          auth_type: password
          auth_mechanism: scram
          auth_source: admin
          database_name: migration_db
          ssl_mode: require
          certificate_arn: arn:aws:secretsmanager:us-east-1:123456789012:secret:mongo-cert-ghi012
      tags:
        Environment: Development
        DatabaseType: MongoDB

    - name: DocDbProvider
      engine: docdb
      data_provider_name: AWS DocumentDB Provider
      settings:
        doc_db_settings:
          server_name: docdb-cluster.example.com
          port: 27017
          database_name: docdb_migration
          ssl_mode: require

stack_tags:
  Test: dms-data-provider
