---
template:
  type: file
  path: dms/instance_profile.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS DMS Instance Profiles for Replication Instance Configuration
  instance_profiles:
    - name: ProductionReplicationProfile
      instance_profile_identifier: prod-replication-profile-001
      instance_profile_name: Production Replication Instance
      description: High-performance replication instance for production database migration
      availability_zone: us-east-1a
      network_type: IPV4
      publicly_accessible: false
      subnet_group_identifier: dms-subnet-group-prod
      kms_key_arn: arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012
      vpc_security_groups:
        - sg-0123456789abcdef0
        - sg-0987654321fedcba0
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Performance: High
        DataClassification: Confidential
        Owner: DatabaseTeam
        CostCenter: Infrastructure

    - name: StagingReplicationProfile
      instance_profile_identifier: staging-replication-profile-002
      instance_profile_name: Staging Replication Instance
      description: Standard replication instance for staging database testing
      availability_zone: us-east-1b
      network_type: IPV4
      publicly_accessible: false
      subnet_group_identifier: dms-subnet-group-staging
      vpc_security_groups:
        - sg-0abcdef0123456789
      deletion_policy: Delete
      tags:
        Environment: Staging
        Performance: Standard
        Purpose: Testing

    - name: DevelopmentReplicationProfile
      instance_profile_identifier: dev-replication-profile-003
      instance_profile_name: Development Replication Instance
      description: Development environment replication instance with public access
      availability_zone: us-east-1c
      network_type: IPV4
      publicly_accessible: true
      subnet_group_identifier: dms-subnet-group-dev
      tags:
        Environment: Development
        Performance: Basic
        DataClassification: Internal

    - name: DisasterRecoveryProfile
      instance_profile_identifier: dr-replication-profile-004
      instance_profile_name: Disaster Recovery Replication
      description: Dedicated instance for disaster recovery and failover scenarios
      availability_zone: us-east-1a
      network_type: IPV4
      publicly_accessible: false
      subnet_group_identifier: dms-subnet-group-dr
      kms_key_arn: arn:aws:kms:us-east-1:123456789012:key/87654321-4321-4321-4321-210987654321
      vpc_security_groups:
        - sg-0fedcba9876543210
        - sg-0123456789abcdef1
        - sg-0abcdef0123456781
      deletion_policy: Retain
      tags:
        Environment: Production
        Purpose: DisasterRecovery
        Critical: "true"
        RPO: "1-hour"
        RTO: "4-hours"

    - name: TestMigrationProfile
      instance_profile_identifier: test-migration-profile-005
      instance_profile_name: Test Migration Instance
      availability_zone: us-east-1b
      network_type: IPV4
      publicly_accessible: false
      deletion_policy: Delete
      tags:
        Environment: Testing
        Temporary: "true"

stack_tags:
  Test: dms-instance-profile
