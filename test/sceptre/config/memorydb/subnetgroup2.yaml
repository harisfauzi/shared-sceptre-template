  source_repo_url: "{{ git_repo }}"
  description: MemoryDB Subnet Groups for Multi-AZ Deployment
  subnet_groups:
    - name: ProductionPrimarySubnetGroup
      subnet_group_name: prod-primary-subnet-group
      description: Production primary subnet group spanning multiple availability zones
      subnet_ids:
        - subnet-0a1b2c3d4e5f6g7h8
        - subnet-1b2c3d4e5f6g7h8i
        - subnet-2c3d4e5f6g7h8i9j
      tags:
        Name: ProductionPrimarySubnetGroup
        Environment: Production
        Team: DataEngineering
        CostCenter: "1001"
        AvailabilityZones: "us-east-1a,us-east-1b,us-east-1c"
    - name: ProductionSecondarySubnetGroup
      subnet_group_name: prod-secondary-subnet-group
      description: Production secondary subnet group for disaster recovery
      subnet_ids:
        - subnet-3d4e5f6g7h8i9j0k
