---
template:
  type: file
  path: apigateway/account.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS API Gateway Account Settings
  accounts:
    - name: PrimaryApiGatewayAccount
      cloud_watch_role_arn: "arn:aws:iam::123456789012:role/APIGatewayCloudWatchLogsRole"
      deletion_policy: Delete
      update_replace_policy: Delete
    - name: SecondaryApiGatewayAccount
      cloud_watch_role_arn: "arn:aws:iam::210987654321:role/APIGatewayCloudWatchLogsRole"
      deletion_policy: Retain

stack_tags:
  Test: apigateway-account
