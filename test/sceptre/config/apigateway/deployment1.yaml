---
template:
  type: file
  path: apigateway/deployment.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS API Gateway Deployments
  deployments:
    - name: PrimaryApiDeployment
      rest_api_id: "a1b2c3d4e5 "
      stage_name: "prod"
      description: "Production API deployment with full monitoring"
      deletion_policy: Delete
      update_replace_policy: Delete
      deployment_canary_settings:
        percent_traffic: 10
        use_stage_cache: false
        stage_variable_overrides:
          environment: "canary"
          version: "v1.0.0-canary"
      stage_description:
        description: "Production stage with comprehensive logging"
        logging_level: "INFO"
        data_trace_enabled: true
        metrics_enabled: true
        tracing_enabled: true
        cache_cluster_enabled: true
        cache_cluster_size: "0.5"
        caching_enabled: true
        cache_ttl_in_seconds: 300
        cache_data_encrypted: true
        throttling_burst_limit: 5000
        throttling_rate_limit: 2000
        client_certificate_id: "cc123456789abcdef "
        documentation_version: "v1.0"
        access_log_setting:
          destination_arn: "arn:aws:logs:us-east-1:123456789012:log-group:/aws/apigateway/production "
          format: "$context.requestId $context.extendedRequestId $context.identity.sourceIp $context.requestTime $context.routeKey $context.status"
        canary_setting:
          percent_traffic: 5
          use_stage_cache: true
          stage_variable_overrides:
            canary: "true"
        variables:
          environment: "production"
          database_endpoint: "prod-db.example.com"
          api_version: "v1"
        tags:
          Environment: Production
          Team: Platform
          Monitoring: Enabled
        method_settings:
          - resource_path: "/*"
            http_method: "ANY"
            logging_level: "INFO"
            data_trace_enabled: true
            metrics_enabled: true
            throttling_burst_limit: 5000
            throttling_rate_limit: 2000
          - resource_path: "/critical-path"
            http_method: "POST"
            logging_level: "ERROR"
            data_trace_enabled: true
            metrics_enabled: true
            throttling_burst_limit: 10000
            throttling_rate_limit: 5000
    - name: SecondaryApiDeployment
      rest_api_id: "f5e4d3c2b1 "
      stage_name: "staging"
      description: "Staging API deployment"
      deletion_policy: Delete
      stage_description:
        description: "Staging stage with basic monitoring"
        logging_level: "ERROR"
        metrics_enabled: true
        cache_cluster_enabled: false
        caching_enabled: false
        throttling_burst_limit: 2000
        throttling_rate_limit: 1000
        access_log_setting:
          destination_arn: "arn:aws:logs:us-east-1:123456789012:log-group:/aws/apigateway/staging "
        variables:
          environment: "staging"
          database_endpoint: "staging-db.example.com"
        method_settings:
          - resource_path: "/*"
            http_method: "ANY"
            logging_level: "ERROR"
            metrics_enabled: true
    - name: TertiaryApiDeployment
      rest_api_id: "a9b8c7d6e5 "
      stage_name: "dev"
      deletion_policy: Retain
      stage_description:
        description: "Development stage with verbose logging"
        logging_level: "INFO"
        data_trace_enabled: true
        metrics_enabled: false
        variables:
          environment: "development"
          database_endpoint: "dev-db.example.com"

stack_tags:
  Test: apigateway-deployment
