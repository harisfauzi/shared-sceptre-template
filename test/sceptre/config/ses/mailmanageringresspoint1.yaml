      type: "SMTP"
      ingress_point_name: "smtp-ingress"
      ingress_point_configuration:
        tls_auth_configuration:
          trust_store:
            ca_content: |-
              -----BEGIN CERTIFICATE-----
              MIIDXTCCAkWgAwIBAgIJAKx0pefZ1f4JMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
