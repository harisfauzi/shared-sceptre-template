    - name: HttpIngressPoint
      deletion_policy: Delete
      update_replace_policy: Delete
      rule_set_id: "ruleset-0123456789abcdef1"
      traffic_policy_id: "trafficpolicy-0123456789abcdef1"
      type: "HTTP"
      ingress_point_name: "http-ingress"
