---
template:
  type: file
  path: ses/mail_manager_archive.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SES Mail Manager Archive(s) for testing purposes"
  mail_manager_archives:
    - name: ComplianceEmailArchive
      deletion_policy: Delete
      update_replace_policy: Delete
      archive_name: "compliance-email-archive"
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      retention:
        retention_period: "P7Y"
      tags:
        Application: "Compliance"
        Sensitivity: "High"
        Department: "Legal"
        Retention: "LongTerm"

    - name: TransactionalEmailArchive
      deletion_policy: Delete
      update_replace_policy: Delete
      archive_name: "transactional-email-archive"
      retention:
        retention_period: "P1Y"
      tags:
        Application: "TransactionalEmailer"
        Environment: "Production"
        Retention: "ShortTerm"

    - name: MarketingCampaignArchive
      deletion_policy: Delete
      update_replace_policy: Delete
      archive_name: "marketing-campaigns-archive"
      kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/87654321-4321-4321-4321-210987654321"
      tags:
        Application: "MarketingCampaigns"
        Department: "Marketing"

    - name: AuditLogArchive
      deletion_policy: Delete
      update_replace_policy: Delete
      archive_name: "audit-log-archive"
      retention:
        retention_period: "P5Y"
      tags:
        Application: "AuditLog"
        Compliance: "Required"
        Department: "IT"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: ses-mail-manager-archive
