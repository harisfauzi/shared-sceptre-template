---
template:
  type: file
  path: ses/receipt_filter.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SES Receipt Filter(s) for testing purposes"
  receipt_filters:
    - name: AllowInternalTrafficFilter
      deletion_policy: Delete
      update_replace_policy: Delete
      filter:
        name: "allow-internal-traffic"
        ip_filter:
          cidr: "192.168.0.0/16"
          policy: "Allow"

    - name: BlockSpamSourceFilter
      deletion_policy: Delete
      update_replace_policy: Delete
      filter:
        name: "block-spam-source"
        ip_filter:
          cidr: "203.0.113.0/24"
          policy: "Block"

    - name: AllowPartnerDomainsFilter
      deletion_policy: Delete
      update_replace_policy: Delete
      filter:
        name: "allow-partner-domains"
        ip_filter:
          cidr: "198.51.100.0/24"
          policy: "Allow"

    - name: BlockBlacklistedNetworkFilter
      filter:
        ip_filter:
          cidr: "192.0.2.0/24"
          policy: "Block"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: ses-receipt-filter
