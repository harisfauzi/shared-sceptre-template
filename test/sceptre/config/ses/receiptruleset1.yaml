---
template:
  type: file
  path: ses/receipt_rule_set.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SES Receipt Rule Set(s) for testing purposes"
  receipt_rule_sets:
    - name: InboundEmailProcessingRuleSet
      deletion_policy: Delete
      update_replace_policy: Delete
      rule_set_name: "inbound-email-processing"

    - name: ComplianceArchivingRuleSet
      deletion_policy: Delete
      update_replace_policy: Delete
      rule_set_name: "compliance-archiving"

    - name: SpamFilteringRuleSet
      deletion_policy: Delete
      update_replace_policy: Delete
      rule_set_name: "spam-filtering"

    - name: NotificationRoutingRuleSet
      rule_set_name: "notification-routing"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: ses-receipt-rule-set
