---
template:
  type: file
  path: lightsail/disk-snapshot.yaml.j2

sceptre_user_data:
  description: "Lightsail Disk Snapshot(s) for testing purposes"
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  disk_snapshots:
    - name: ApplicationServerDiskSnapshot
      deletion_policy: Delete
      update_replace_policy: Delete
      disk_name: "production-app-disk"
      disk_snapshot_name: "production-app-disk-snapshot-v1"
      tags:
        Environment: "Production"
        Application: "WebServer"
        BackupType: "Daily"

    - name: DatabaseStorageDiskSnapshot
      deletion_policy: Delete
      update_replace_policy: Delete
      disk_name: "database-storage-disk"
      disk_snapshot_name: "database-storage-disk-snapshot-v1"
      tags:
        Environment: "Production"
        Application: "Database"
        Owner: "StorageTeam"

    - name: DevelopmentWorkspaceDiskSnapshot
      deletion_policy: Delete
      update_replace_policy: Delete
      disk_name: "dev-workspace-disk"
      disk_snapshot_name: "dev-workspace-disk-snapshot-v1"
      tags:
        Environment: "Development"
        BackupType: "OnDemand"
        Purpose: "Development"

    - name: CachingLayerDiskSnapshot
      deletion_policy: Delete
      update_replace_policy: Delete
      disk_name: "cache-layer-disk"
      disk_snapshot_name: "cache-layer-disk-snapshot-backup"
      tags:
        Environment: "Production"
        Application: "Cache"
        CriticalData: "false"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: lightsail-disk-snapshot
