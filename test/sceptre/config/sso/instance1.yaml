---
template:
  type: file
  path: sso/instance.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: CloudFormation template to test SSO Instance with comprehensive Jinja2 template coverage.
  instances:
    - name: BasicInstance
      instance_name: BasicSSOInstance

    - name: EnterpriseInstance
      instance_name: EnterpriseSSOInstance
      deletion_policy: Retain
      update_replace_policy: Retain
      tags:
        Environment: Production
        Application: EnterpriseSSOInstance
        Owner: CloudTeam

    - name: DevelopmentInstance
      instance_name: DevSSOInstance
      tags:
        Environment: Development
        Application: DevelopmentSSOInstance
        CostCenter: Engineering

stack_tags:
  Test: sso-instance
