---
template:
  type: file
  path: codecommit/repository.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: AWS CodeCommit Repositories
  repositories:
    - name: PrimaryProductionRepository
      repository_name: "prod-application-repo"
      repository_description: "Production application repository with code initialization"
      deletion_policy: Delete
      update_replace_policy: Delete
      kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012 "
      code:
        branch_name: "main"
        s3:
          bucket: "my-deployment-bucket"
          key: "repos/application-source-v1.0.zip"
          object_version: "abc123def456ghi789 "
      triggers:
        - name: "ProdDeploymentTrigger"
          destination_arn: "arn:aws:lambda:us-east-1:123456789012:function:deploy-prod"
          events:
            - "all"
          branches:
            - "main"
            - "release/*"
          custom_data: "prod-deployment-context"
        - name: "ProdBuildNotification"
          destination_arn: "arn:aws:sns:us-east-1:123456789012:prod-codecommit-notifications"
          events:
            - "pullRequestCreated"
            - "pullRequestMerged"
          custom_data: "build-notification"
      tags:
        Environment: Production
        Team: Platform
        CostCenter: "3001"
        Notifications: Enabled
    - name: SecondaryProductionRepository
      repository_name: "prod-infrastructure-repo"
      repository_description: "Infrastructure as Code repository"
      deletion_policy: Delete
      code:
        branch_name: "develop"
        s3:
          bucket: "my-deployment-bucket"
          key: "repos/infrastructure-code.zip"
      triggers:
        - name: "IaCScanTrigger"
          destination_arn: "arn:aws:lambda:us-east-1:123456789012:function:scan-iac"
          events:
            - "pullRequestCreated"
          branches:
            - "develop"
      tags:
        Environment: Production
        Team: Infrastructure
        CostCenter: "3002"
    - name: TertiaryDevelopmentRepository
      repository_name: "dev-sandbox-repo"
      repository_description: "Development sandbox repository"
      deletion_policy: Retain
      tags:
        Environment: Development
        Team: Engineering
        CostCenter: "3003"

stack_tags:
  Test: codecommit-repository
