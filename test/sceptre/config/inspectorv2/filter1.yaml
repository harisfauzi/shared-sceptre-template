---
template:
  type: file
  path: inspectorv2/filter.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: InspectorV2 Filters for {{project_code}}
  filters:
    - name: HighSeverityVulnerabilities
      filter_name: high-severity-filter
      filter_action: SUPPRESS
      description: Filter to suppress high severity vulnerabilities
      filter_criteria:
        severity:
          - comparison: EQUALS
            value: HIGH
          - comparison: EQUALS
            value: CRITICAL
        finding_status:
          - comparison: EQUALS
            value: ACTIVE
      tags:
        FilterType: Severity
        Environment: Production
    - name: EcrImageFilter
      filter_name: ecr-image-filter
      filter_action: ALLOW
      description: Filter for ECR image vulnerabilities
      filter_criteria:
        ecr_image_registry:
          - comparison: EQUALS
            value: "123456789012.dkr.ecr.us-east-1.amazonaws.com"
        ecr_image_repository_name:
          - comparison: PREFIX
            value: "myapp-"
        resource_tags:
          - key: Environment
            comparison: EQUALS
            value: Production
      tags:
        FilterType: ECRImage
        Environment: Production

stack_tags:
  Test: inspectorv2-filter
