---
template:
  type: file
  path: eks/cluster.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "EKS Clusters for production workloads"
  clusters:
    - name: ProductionCluster
      cluster_name: production-eks-cluster
      version: "1.30"
      deletion_policy: Retain
      role_arn: "arn:aws:iam::123456789012:role/eks-cluster-role"
      resources_vpc_config:
        subnet_ids:
          - subnet-12345678
          - subnet-87654321
          - subnet-11111111
        security_group_ids:
          - sg-12345678
          - sg-87654321
        endpoint_private_access: true
        endpoint_public_access: true
        public_access_cidrs:
          - "203.0.113.0/24"
          - "198.51.100.0/24"
        control_plane_egress_mode: CLUSTER
      access_config:
        authentication_mode: API_AND_CONFIG_MAP
        bootstrap_cluster_creator_admin_permissions: true
      kubernetes_network_config:
        ip_family: ipv4
        service_ipv4_cidr: "10.100.0.0/16"
        elastic_load_balancing:
          enabled: true
      encryption_config:
        - resources:
            - secrets
          provider:
            key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      logging:
        cluster_logging:
          enabled_types:
            - type: api
            - type: audit
            - type: authenticator
            - type: controllerManager
            - type: scheduler
      deletion_protection: true
      bootstrap_self_managed_addons: false
      storage_config:
        block_storage:
          enabled: true
      upgrade_policy:
        support_type: EXTENDED
      zonal_shift_config:
        enabled: true
      tags:
        Environment: Production
        Team: Platform
        CostCenter: Engineering

    - name: DevelopmentCluster
      cluster_name: development-eks-cluster
      version: "1.29"
      deletion_policy: Delete
      role_arn: "arn:aws:iam::123456789012:role/eks-dev-cluster-role"
      resources_vpc_config:
        subnet_ids:
          - subnet-dev-1111
          - subnet-dev-2222
        endpoint_private_access: false
        endpoint_public_access: true
        public_access_cidrs:
          - "0.0.0.0/0"
      access_config:
        authentication_mode: CONFIG_MAP
        bootstrap_cluster_creator_admin_permissions: false
      kubernetes_network_config:
        ip_family: ipv4
        service_ipv4_cidr: "10.200.0.0/16"
      compute_config:
        enabled: true
        node_role_arn: "arn:aws:iam::123456789012:role/eks-node-role"
        node_pools:
          - general-purpose
          - compute-optimized
      logging:
        cluster_logging:
          enabled_types:
            - type: api
            - type: audit
      bootstrap_self_managed_addons: true
      tags:
        Environment: Development
        Team: Platform

    - name: EdgeCluster
      cluster_name: edge-eks-outposts-cluster
      deletion_policy: Retain
      role_arn: "arn:aws:iam::123456789012:role/eks-outpost-cluster-role"
      resources_vpc_config:
        subnet_ids:
          - subnet-outpost-1
          - subnet-outpost-2
      outpost_config:
        control_plane_instance_type: m5.large
        outpost_arns:
          - "arn:aws:outposts:us-east-1:123456789012:outpost/op-1234567890abcdef0"
          - "arn:aws:outposts:us-east-1:123456789012:outpost/op-0fedcba0987654321"
        control_plane_placement:
          group_name: control-plane-group
          spread_level: HOST
        etcd_instance_type: m5.large
        etcd_placement:
          spread_level: HOST
      deletion_protection: false
      force: false
      tags:
        Environment: Edge
        Team: Infrastructure
        Location: Outpost

    - name: RemoteCluster
      cluster_name: remote-eks-cluster
      deletion_policy: Delete
      role_arn: "arn:aws:iam::123456789012:role/eks-remote-cluster-role"
      resources_vpc_config:
        subnet_ids:
          - subnet-remote-1
          - subnet-remote-2
      remote_network_config:
        remote_node_networks:
          - cidrs:
              - "10.50.0.0/16"
              - "10.51.0.0/16"
          - cidrs:
              - "10.52.0.0/16"
        remote_pod_networks:
          - cidrs:
              - "172.16.0.0/16"
              - "172.17.0.0/16"
          - cidrs:
              - "172.18.0.0/16"
      kubernetes_network_config:
        ip_family: ipv4
        service_ipv4_cidr: "10.300.0.0/16"
      control_plane_scaling_config:
        tier: ON_DEMAND
      tags:
        Environment: Remote
        Team: Platform

stack_tags:
  Test: eks-cluster




