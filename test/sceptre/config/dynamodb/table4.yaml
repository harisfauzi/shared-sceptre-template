---
template:
  path: dynamodb/table.yaml.j2

sceptre_user_data:
  project_code: '{{ stack_group_config.project_code }}'
  source_repo_url: '{{git_repo}}'
  description: 'DynamoDB Tables for Application'
  tables:
    - name: MusicCatalogTable
      table_name: MusicCatalogTable
      billing_mode: PAY_PER_REQUEST
      deletion_policy: Delete
      table_class: STANDARD
      stream_specification:
        stream_view_type: NEW_AND_OLD_IMAGES
      time_to_live_specification:
        attribute_name: ExpiresAt
        enabled: true
      attribute_definitions:
        - attribute_name: ArtistId
          attribute_type: S
        - attribute_name: AlbumId
          attribute_type: S
        - attribute_name: SalesRank
          attribute_type: N
        - attribute_name: ReleaseYear
          attribute_type: N
      key_schema:
        - attribute_name: ArtistId
          key_type: HASH
        - attribute_name: AlbumId
          key_type: RANGE
      global_secondary_indexes:
        - index_name: SalesRankIndex
          key_schema:
            - attribute_name: SalesRank
              key_type: HASH
            - attribute_name: ReleaseYear
              key_type: RANGE
          projection:
            projection_type: INCLUDE
            non_key_attributes:
              - ArtistId
              - AlbumId
          on_demand_throughput:
            max_read_request_units: 100
            max_write_request_units: 100
        - index_name: ReleaseYearIndex
          key_schema:
            - attribute_name: ReleaseYear
              key_type: HASH
            - attribute_name: SalesRank
              key_type: RANGE
          projection:
            projection_type: ALL
      local_secondary_indexes:
        - index_name: YearSortIndex
          key_schema:
            - attribute_name: ArtistId
              key_type: HASH
            - attribute_name: ReleaseYear
              key_type: RANGE
          projection:
            projection_type: INCLUDE
            non_key_attributes:
              - AlbumId
      point_in_time_recovery_specification:
        point_in_time_recovery_enabled: true
      sse_specification:
        sse_enabled: true
        sse_type: KMS
      tags:
        Application: MusicService
        Environment: Production
    - name: UserSessionTable
      table_name: UserSessionTable
      billing_mode: PROVISIONED
      deletion_policy: Retain
      deletion_protection_enabled: true
      table_class: STANDARD_INFREQUENT_ACCESS
      attribute_definitions:
        - attribute_name: UserId
          attribute_type: S
        - attribute_name: SessionId
          attribute_type: S
        - attribute_name: CreatedAt
          attribute_type: N
      key_schema:
        - attribute_name: UserId
          key_type: HASH
        - attribute_name: SessionId
          key_type: RANGE
      provisioned_throughput:
        read_capacity_units: 10
        write_capacity_units: 10
      global_secondary_indexes:
        - index_name: CreatedAtIndex
          key_schema:
            - attribute_name: CreatedAt
              key_type: HASH
          projection:
            projection_type: ALL
          provisioned_throughput:
            read_capacity_units: 5
            write_capacity_units: 5
      time_to_live_specification:
        attribute_name: SessionExpiresAt
        enabled: true
      stream_specification:
        stream_view_type: NEW_IMAGE
      sse_specification:
        sse_enabled: true
      tags:
        Application: SessionManager
        Sensitive: true

stack_tags:
  Test: dynamodb-table
  Name: dynamodb-table-test
