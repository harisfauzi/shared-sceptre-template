---
template:
  type: file
  path: dynamodb/global_table.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "Global DynamoDB Tables for Music Database"
  global_tables:
    - name: MusicGlobalTable
      table_name: MusicGlobalTable
      billing_mode: PAY_PER_REQUEST
      deletion_policy: Delete
      update_replace_policy: Delete
      stream_specification:
        stream_view_type: NEW_AND_OLD_IMAGES
      time_to_live_specification:
        attribute_name: ExpiresAt
        enabled: true
      attribute_definitions:
        - attribute_name: ArtistId
          attribute_type: S
        - attribute_name: AlbumId
          attribute_type: S
        - attribute_name: SalesRank
          attribute_type: N
        - attribute_name: ReleaseDate
          attribute_type: S
      key_schema:
        - attribute_name: ArtistId
          key_type: HASH
        - attribute_name: AlbumId
          key_type: RANGE
      global_secondary_indexes:
        - index_name: SalesRankIndex
          key_schema:
            - attribute_name: SalesRank
              key_type: HASH
            - attribute_name: ReleaseDate
              key_type: RANGE
          projection:
            projection_type: INCLUDE
            non_key_attributes:
              - ArtistId
              - AlbumId
          read_on_demand_throughput_settings:
            max_read_request_units: 100
        - index_name: ReleaseDateIndex
          key_schema:
            - attribute_name: ReleaseDate
              key_type: HASH
            - attribute_name: SalesRank
              key_type: RANGE
          projection:
            projection_type: ALL
      local_secondary_indexes:
        - index_name: DateSortIndex
          key_schema:
            - attribute_name: ArtistId
              key_type: HASH
            - attribute_name: ReleaseDate
              key_type: RANGE
          projection:
            projection_type: INCLUDE
            non_key_attributes:
              - AlbumId
      replicas:
        - region: us-east-1
          deletion_protection_enabled: false
          table_class: STANDARD
          point_in_time_recovery_specification:
            point_in_time_recovery_enabled: true
        - region: eu-west-1
          deletion_protection_enabled: false
          table_class: STANDARD
          point_in_time_recovery_specification:
            point_in_time_recovery_enabled: true
        - region: ap-southeast-1
          deletion_protection_enabled: false
          table_class: STANDARD
          point_in_time_recovery_specification:
            point_in_time_recovery_enabled: true
      sse_specification:
        sse_enabled: true
        sse_type: KMS
    - name: UserProfileGlobalTable
      table_name: UserProfileGlobalTable
      billing_mode: PROVISIONED
      deletion_policy: Retain
      stream_specification:
        stream_view_type: NEW_IMAGE
      attribute_definitions:
        - attribute_name: UserId
          attribute_type: S
        - attribute_name: Email
          attribute_type: S
      key_schema:
        - attribute_name: UserId
          key_type: HASH
      global_secondary_indexes:
        - index_name: EmailIndex
          key_schema:
            - attribute_name: Email
              key_type: HASH
          projection:
            projection_type: ALL
          read_provisioned_throughput_settings:
            read_capacity_units: 10
      replicas:
        - region: us-east-1
          deletion_protection_enabled: true
          table_class: STANDARD_INFREQUENT_ACCESS
          read_provisioned_throughput_settings:
            read_capacity_units: 10
        - region: us-west-2
          deletion_protection_enabled: true
          table_class: STANDARD_INFREQUENT_ACCESS
          read_provisioned_throughput_settings:
            read_capacity_units: 10
      sse_specification:
        sse_enabled: true

stack_tags:
  Test: dynamodb-table
  Name: dynamodb-table-test
