---
template:
  type: file
  path: cloudfront/key_value_store.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Key Value Store(s) for Configuration Data
  key_value_stores:
    - name: ProductionKeyValueStore
      deletion_policy: Delete
      update_replace_policy: Delete
      key_value_store_name: "production-config-store"
      comment: "Production key-value store for feature flags and configuration"
      import_source:
        source_arn: "arn:aws:s3:::my-config-bucket/production-kvs-data.json"
        source_type: "S3"
      tags:
        Environment: "Production"
        Purpose: "Configuration Storage"
        Owner: "Platform"

    - name: StagingKeyValueStore
      deletion_policy: Delete
      key_value_store_name: "staging-config-store"
      comment: "Staging environment key-value store"
      tags:
        Environment: "Staging"
        Purpose: "Configuration Storage"

    - name: DevelopmentKeyValueStore
      deletion_policy: Retain
      key_value_store_name: "development-config-store"

stack_tags:
  Test: cloudfront-key-value-store
