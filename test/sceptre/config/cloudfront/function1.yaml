---
template:
  type: file
  path: cloudfront/function.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Function(s) for Request/Response Processing
  functions:
    - name: RequestHeaderModifier
      deletion_policy: Delete
      update_replace_policy: Delete
      function_name: "modify-request-headers"
      auto_publish: true
      function_code: |-
        function handler(event) {
          var request = event.request;
          request.headers['x-custom-header'] = {
            value: 'cloudfront-function'
          };
          request.headers['x-request-time'] = {
            value: new Date().toISOString()
          };
          return request;
        }
      function_config:
        comment: "Adds custom headers to incoming requests"
        runtime: "cloudfront-js-1.0"
        key_value_store_associations:
          - key_value_store_arn: "arn:aws:cloudfront::123456789012:key-value-store/kvs-12345678901234567"
      tags:
        Environment: "Production"
        Purpose: "Header Manipulation"
        Owner: "Platform"

    - name: UrlRewriter
      deletion_policy: Delete
      function_name: "rewrite-request-paths"
      auto_publish: true
      function_code: |-
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          }
          return request;
        }
      function_config:
        comment: "Rewrites URL paths for directory requests"
        runtime: "cloudfront-js-1.0"
      tags:
        Environment: "Production"
        Purpose: "URL Rewriting"

    - name: ResponseCacheController
      deletion_policy: Retain
      function_name: "control-response-caching"
      function_code: |-
        function handler(event) {
          var response = event.response;
          response.headers['cache-control'] = {
            value: 'max-age=3600, public'
          };
          return response;
        }
      function_config:
        comment: "Controls cache behavior based on response content"
        runtime: "cloudfront-js-1.0"
      tags:
        Environment: "Development"
        Purpose: "Cache Control"

stack_tags:
  Test: cloudfront-function
