---
template:
  type: file
  path: cloudfront/distribution_tenant.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Distribution Tenant(s) for Multi-Tenant Deployments
  distribution_tenants:
    - name: PrimaryTenant
      deletion_policy: Delete
      update_replace_policy: Delete
      distribution_id: "E1234567890ABC"
      distribution_tenant_name: "primary-tenant"
      connection_group_id: "12a3b456-7890-1c2d-e34f-567g890h1i23"
      domains:
        - "tenant1.example.com"
        - "api.tenant1.example.com"
      enabled: true
      customizations:
        certificate:
          arn: "arn:aws:acm:us-east-1:123456789012:certificate/abcdef12-3456-7890-abcd-ef1234567890"
        geo_restrictions:
          restriction_type: "whitelist"
          locations:
            - "US"
            - "CA"
            - "GB"
        web_acl:
          action: "ALLOW"
          arn: "arn:aws:wafv2:us-east-1:123456789012:global/webacl/tenant1-prod/a1b2c3d4-5678-90ab-cdef-example00001"
      parameters:
        - name: "EnvironmentType"
          value: "Production"
        - name: "TenantId"
          value: "tenant-001"
      tags:
        Environment: "Production"
        TenantId: "tenant-001"
        Team: "Platform"

    - name: SecondaryTenant
      deletion_policy: Delete
      distribution_id: "E9876543210XYZ"
      distribution_tenant_name: "secondary-tenant"
      connection_group_id: "98z7y654-3210-x9w8-v7u6-543t210s9r8q"
      domains:
        - "tenant2.example.com"
      enabled: true
      customizations:
        certificate:
          arn: "arn:aws:acm:us-east-1:123456789012:certificate/xyz12345-6789-0abc-def0-1234567890ab"
        geo_restrictions:
          restriction_type: "none"
        web_acl:
          arn: "arn:aws:wafv2:us-east-1:123456789012:global/webacl/tenant2-staging/b2c3d4e5-6789-01bc-def1-example00002"
      parameters:
        - name: "EnvironmentType"
          value: "Staging"
        - name: "TenantId"
          value: "tenant-002"
      tags:
        Environment: "Staging"
        TenantId: "tenant-002"

    - name: TertiaryTenant
      deletion_policy: Retain
      distribution_id: "E5555555555555"
      distribution_tenant_name: "tertiary-tenant"
      connection_group_id: "55e5d654-5555-e5d5-c5d5-555c5d5e5d5f"
      domains:
        - "tenant3.example.com"
        - "assets.tenant3.example.com"
      managed_certificate_request:
        primary_domain_name: "tenant3.example.com"
        certificate_transparency_logging_preference: "ENABLED"
      tags:
        Environment: "Development"
        TenantId: "tenant-003"

stack_tags:
  Test: cloudfront-distribution-tenant
