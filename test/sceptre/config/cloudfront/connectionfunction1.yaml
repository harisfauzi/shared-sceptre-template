---
template:
  type: file
  path: cloudfront/connection_function.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Connection Function(s) for Request Validation
  connection_functions:
    - name: AuthenticationConnectionFunction
      deletion_policy: Delete
      update_replace_policy: Delete
      connection_function_name: "auth-connection-handler"
      auto_publish: true
      connection_function_code: |
        function handler(request) {
          const token = request.headers['authorization'] ? request.headers['authorization'][0].value : null;
          if (!token) {
            return {
              statusCode: 401,
              statusDescription: 'Unauthorized'
            };
          }
          return request;
        }
      connection_function_config:
        comment: "Validates authentication tokens from client connections"
        runtime: "cloudfront-js-1.0"
      tags:
        Environment: "Production"
        Purpose: "Authentication"

    - name: RequestValidationConnectionFunction
      deletion_policy: Delete
      connection_function_name: "request-validation-handler"
      connection_function_code: |
        function handler(request) {
          const method = request.method;
          const allowedMethods = ['GET', 'POST', 'PUT', 'DELETE'];
          if (!allowedMethods.includes(method)) {
            return {
              statusCode: 405,
              statusDescription: 'Method Not Allowed'
            };
          }
          return request;
        }
      connection_function_config:
        comment: "Validates HTTP methods for incoming connections"
        runtime: "cloudfront-js-1.0"
        key_value_store_associations:
          - key_value_store_arn: "arn:aws:cloudfront::123456789012:key-value-store/kvs-12345678901234567"
      tags:
        Environment: "Staging"
        Purpose: "Request Validation"

    - name: HeaderManipulationConnectionFunction
      deletion_policy: Retain
      connection_function_name: "header-manipulation-handler"
      connection_function_code: |
        function handler(request) {
          request.headers['x-processed-by'] = {
            value: 'cloudfront-connection-function'
          };
          request.headers['x-request-time'] = {
            value: new Date().toISOString()
          };
          return request;
        }
      connection_function_config:
        comment: "Adds custom headers to connection requests"
        runtime: "cloudfront-js-1.0"

stack_tags:
  Test: cloudfront-connection-function
