---
template:
  type: file
  path: cloudfront/cache_policy.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Cache Policies
  cache_policies:
    - name: BasicCachePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      cache_policy_config:
        default_ttl: 86400
        max_ttl: 31536000
        min_ttl: 1
        name: BasicCachingPolicy
        parameters_in_cache_key_and_forwarded_to_origin:
          cookies_config:
            cookie_behavior: "none"
          enable_accept_encoding_gzip: true
          headers_config:
            header_behavior: "none"
          query_strings_config:
            query_strings_behavior: "none"

    - name: AdvancedCachePolicy
      deletion_policy: Delete
      cache_policy_config:
        default_ttl: 3600
        max_ttl: 86400
        min_ttl: 0
        name: AdvancedCachingPolicy
        comment: "Advanced cache policy with selective caching based on cookies, headers, and query strings"
        parameters_in_cache_key_and_forwarded_to_origin:
          cookies_config:
            cookie_behavior: "whitelist"
            cookies:
              - "session_id"
              - "user_token"
              - "tracking_id"
          enable_accept_encoding_gzip: true
          enable_accept_encoding_brotli: true
          headers_config:
            header_behavior: "whitelist"
            headers:
              - "Authorization"
              - "Host"
              - "X-Custom-Header"
          query_strings_config:
            query_strings_behavior: "whitelist"
            query_strings:
              - "version"
              - "category"
              - "page"

    - name: CustomCachePolicy
      deletion_policy: Retain
      cache_policy_config:
        default_ttl: 604800
        max_ttl: 2592000
        min_ttl: 60
        name: CustomCachingPolicy
        comment: "Custom cache policy with Brotli and Gzip compression for API responses"
        parameters_in_cache_key_and_forwarded_to_origin:
          cookies_config:
            cookie_behavior: "all"
          enable_accept_encoding_gzip: true
          enable_accept_encoding_brotli: true
          headers_config:
            header_behavior: "all"
          query_strings_config:
            query_strings_behavior: "all"

stack_tags:
  Test: cloudfront-cache-policy
