---
template:
  type: file
  path: cloudfront/key_group.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: CloudFront Key Group(s) for Signed Content Distribution
  key_groups:
    - name: ProductionKeyGroup
      deletion_policy: Delete
      update_replace_policy: Delete
      key_group_config:
        name: "production-content-signing-keys"
        comment: "Key group for production content signing and verification"
        _items:
          - "APKAJC7EXAMPLE1"
          - "APKAJC7EXAMPLE2"
          - "APKAJC7EXAMPLE3"

    - name: StagingKeyGroup
      deletion_policy: Delete
      key_group_config:
        name: "staging-content-signing-keys"
        comment: "Key group for staging environment content signing"
        _items:
          - "APKAJC7STAGING1"
          - "APKAJC7STAGING2"

    - name: DevelopmentKeyGroup
      deletion_policy: Retain
      key_group_config:
        name: "development-content-signing-keys"
        _items:
          - "APKAJC7DEVKEY01"

stack_tags:
  Test: cloudfront-key-group
