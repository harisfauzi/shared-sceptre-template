---
template:
  type: file
  path: sqs/queue_inline_policy.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SQS Queue Inline Policy(s) for testing purposes"
  queue_inline_policies:
    - name: LambdaQueueInlinePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document: |-
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaReceiveAndDelete
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: '*'
            Condition:
              ArnLike:
                aws:SourceArn: "arn:aws:lambda:us-east-1:123456789012:function:queue-processor"
      queue: "https://sqs.us-east-1.amazonaws.com/123456789012/standard-processing-queue"

    - name: EventBridgePublishInlinePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document: |-
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: '*'
            Condition:
              ArnEquals:
                aws:SourceArn: "arn:aws:events:us-east-1:123456789012:rule/daily-task"
      queue: "https://sqs.us-east-1.amazonaws.com/123456789012/fifo-ordering-queue.fifo"

    - name: CrossAccountAccessInlinePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document_json: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "AllowCrossAccountRead",
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::210987654321:root"
              },
              "Action": [
                "sqs:ReceiveMessage",
                "sqs:GetQueueAttributes",
                "sqs:GetQueueUrl"
              ],
              "Resource": "*"
            }
          ]
        }
      queue: "https://sqs.us-east-1.amazonaws.com/123456789012/processing-with-dlq"

    - name: DataAnalystQueueInlinePolicy
      deletion_policy: Retain
      update_replace_policy: Retain
      policy_document: |-
        Version: '2012-10-17'
        Statement:
          - Sid: AllowDataAnalystAccess
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::123456789012:role/data-analyst-role"
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: '*'
          - Sid: DenyDeleteQueueAccess
            Effect: Deny
            Principal:
              AWS: "arn:aws:iam::123456789012:role/data-analyst-role"
            Action:
              - sqs:DeleteQueue
              - sqs:PurgeQueue
            Resource: '*'
      queue: "https://sqs.us-east-1.amazonaws.com/123456789012/encrypted-high-throughput"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: sqs-queue-inline-policy
