---
template:
  type: file
  path: sqs/queue_policy.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SQS Queue Policy(s) for testing purposes"
  queue_policies:
    - name: LambdaProcessingQueuePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document_json: |-
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "lambda.amazonaws.com"
              },
              "Action": [
                "sqs:ReceiveMessage",
                "sqs:DeleteMessage",
                "sqs:GetQueueAttributes"
              ],
              "Resource": [
                "arn:aws:sqs:us-east-1:123456789012:standard-processing-queue",
                "arn:aws:sqs:us-east-1:123456789012:fifo-ordering-queue.fifo"
              ],
              "Condition": {
                "ArnLike": {
                  "aws:SourceArn": "arn:aws:lambda:us-east-1:123456789012:function:queue-processor"
                }
              }
            }
          ]
        }
      queues:
        - "https://sqs.us-east-1.amazonaws.com/123456789012/standard-processing-queue"
        - "https://sqs.us-east-1.amazonaws.com/123456789012/fifo-ordering-queue.fifo"

    - name: SnsPublisherQueuePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document: |-
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: arn:aws:sqs:us-east-1:123456789012:processing-with-dlq
            Condition:
              ArnEquals:
                aws:SourceArn: arn:aws:sns:us-east-1:123456789012:event-notifications
      queues:
        - "https://sqs.us-east-1.amazonaws.com/123456789012/processing-with-dlq"

    - name: CrossAccountAccessQueuePolicy
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_document_json: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::210987654321:role/CrossAccountQueueAccess"
              },
              "Action": [
                "sqs:SendMessage",
                "sqs:ReceiveMessage",
                "sqs:GetQueueAttributes"
              ],
              "Resource": "arn:aws:sqs:us-east-1:123456789012:encrypted-high-throughput"
            }
          ]
        }
      queues:
        - "https://sqs.us-east-1.amazonaws.com/123456789012/encrypted-high-throughput"

    - name: ApplicationRoleQueuePolicy
      deletion_policy: Retain
      update_replace_policy: Retain
      policy_document_json: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::123456789012:role/application-service-role"
              },
              "Action": [
                "sqs:SendMessage",
                "sqs:ReceiveMessage",
                "sqs:DeleteMessage",
                "sqs:GetQueueAttributes",
                "sqs:GetQueueUrl",
                "sqs:ListQueues",
                "sqs:ChangeMessageVisibility"
              ],
              "Resource": [
                "arn:aws:sqs:us-east-1:123456789012:standard-processing-queue",
                "arn:aws:sqs:us-east-1:123456789012:processing-with-dlq"
              ]
            }
          ]
        }
      queues:
        - "https://sqs.us-east-1.amazonaws.com/123456789012/standard-processing-queue"
        - "https://sqs.us-east-1.amazonaws.com/123456789012/processing-with-dlq"

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: sqs-queue-policy
