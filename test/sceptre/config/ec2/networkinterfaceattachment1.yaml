---
template:
  type: file
  path: ec2/network_interface_attachment.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: Sample Network Interface Attachments
  network_interface_attachments:
    - name: NetworkInterfaceAttachment1
      device_index: "0"
      instance_id: "i-12345678abcdef01"
      network_interface_id: "eni-12345678"
    - name: NetworkInterfaceAttachment2
      device_index: "1"
      instance_id: "i-87654321ghijkl02"
      network_interface_id: "eni-87654321"
      delete_on_termination: true
      ena_srd_specification:
        ena_srd_enabled: true
      deletion_policy: Retain
    - name: NetworkInterfaceAttachment3
      device_index: "2"
      instance_id: "i-aabbccddmnopqr03"
      network_interface_id: "eni-abcdef01"
      delete_on_termination: false
      ena_srd_specification:
        ena_srd_enabled: true
        ena_srd_udp_specification:
          ena_srd_udp_enabled: true
      update_replace_policy: Retain

stack_tags:
  Test: ec2-network-interface-attachment
