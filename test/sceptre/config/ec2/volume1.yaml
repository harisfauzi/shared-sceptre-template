---
template:
  type: file
  path: ec2/volume.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: EC2 Volumes
  volumes:
    - name: PrimaryProductionVolume
      availability_zone: "us-east-1a"
      volume_type: "gp3"
      size: 100
      encrypted: true
      kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      iops: 3000
      throughput: 125
      auto_enable_io: true
      multi_attach_enabled: false
      deletion_policy: Delete
      update_replace_policy: Delete
      tags:
        Environment: Production
        Owner: StorageTeam
        BackupPolicy: Daily
    - name: SecondaryApplicationVolume
      availability_zone: "us-east-1b"
      volume_type: "gp3"
      size: 50
      encrypted: true
      iops: 1000
      throughput: 100
      deletion_policy: Delete
      tags:
        Environment: Staging
        Owner: ApplicationTeam
    - name: TertiarySnapshotRestoredVolume
      availability_zone_id: "use1-az3"
      volume_type: "io2"
      snapshot_id: "snap-1234567890abcdef0"
      encrypted: true
      iops: 5000
      multi_attach_enabled: true
      volume_initialization_rate: 100
      deletion_policy: Retain
      tags:
        Environment: Development
        Owner: DataEngineering
        SourceSnapshot: "snap-1234567890abcdef0"

stack_tags:
  Test: ec2-volume
