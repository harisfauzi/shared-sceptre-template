---
template:
  type: file
  path: ec2/transit_gateway_vpc_attachment.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: EC2 Transit Gateway VPC Attachments
  transit_gateway_vpc_attachments:
    - name: PrimaryVpcAttachment
      transit_gateway_id: "tgw-12345678901234567"
      vpc_id: "vpc-12345678901234567"
      subnet_ids:
        - "subnet-11111111111111111"
        - "subnet-22222222222222222"
      deletion_policy: Delete
      update_replace_policy: Delete
      options:
        appliance_mode_support: "enable"
        dns_support: "enable"
        ipv6_support: "enable"
        security_group_referencing_support: "enable"
      tags:
        Environment: Production
        Owner: NetworkTeam
        Tier: Core
    - name: SecondaryVpcAttachment
      transit_gateway_id: "tgw-87654321098765432"
      vpc_id: "vpc-87654321098765432"
      subnet_ids:
        - "subnet-33333333333333333"
      add_subnet_ids:
        - "subnet-44444444444444444"
        - "subnet-55555555555555555"
      options:
        dns_support: "enable"
      tags:
        Environment: Staging
        Owner: DevOpsTeam
    - name: TertiaryVpcAttachment
      transit_gateway_id: "tgw-abcdef1234567890ab"
      vpc_id: "vpc-abcdef1234567890ab"
      subnet_ids:
        - "subnet-66666666666666666"
        - "subnet-77777777777777777"
      remove_subnet_ids:
        - "subnet-88888888888888888"
      deletion_policy: Retain
      tags:
        Environment: Development
        Owner: CloudEngineering

stack_tags:
  Test: ec2-transit-gateway-vpc-attachment
