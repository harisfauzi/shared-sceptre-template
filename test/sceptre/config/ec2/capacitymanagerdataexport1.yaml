---
template:
  type: file
  path: ec2/capacity-manager-data-export.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  capacity_manager_data_exports:
    - name: CapacityExportProd
      output_format: Parquet
      s3_bucket_name: my-capacity-exports-bucket
      schedule: "rate(7 days)"
      s3_bucket_prefix: exports/production
      tags:
        Environment: production
        Owner: infrastructure-team
    - name: CapacityExportStaging
      output_format: CSV
      s3_bucket_name: my-capacity-exports-bucket
      schedule: "rate(1 day)"
      s3_bucket_prefix: exports/staging
      deletion_policy: Retain
      tags:
        Environment: staging
        CostCenter: "12345"

stack_tags:
  Test: ec2-capacityreservation
