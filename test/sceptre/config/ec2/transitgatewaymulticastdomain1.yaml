---
template:
  type: file
  path: ec2/transit_gateway_multicast_domain.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: EC2 Transit Gateway Multicast Domains
  transit_gateway_multicast_domains:
    - name: PrimaryMulticastDomain
      transit_gateway_id: "tgw-12345678901234567"
      deletion_policy: Delete
      update_replace_policy: Delete
      options:
        auto_accept_shared_associations: "enable"
        igmp_v2_support: "enable"
        static_sources_support: "enable"
      tags:
        Environment: Production
        Owner: NetworkTeam
        CostCenter: "1001"
    - name: SecondaryMulticastDomain
      transit_gateway_id: "tgw-87654321098765432"
      options:
        igmp_v2_support: "enable"
      tags:
        Environment: Staging
        Owner: DevOpsTeam
    - name: TertiaryMulticastDomain
      transit_gateway_id: "tgw-abcdef1234567890ab"
      deletion_policy: Retain
      options:
        auto_accept_shared_associations: "disable"
        static_sources_support: "disable"
      tags:
        Environment: Development
        CreatedDate: "2026-04-20"

stack_tags:
  Test: ec2-transit-gateway-multicast-domain
