---
template:
  type: file
  path: ec2/security_group_egress.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: Sample Security Group Egress Rules
  security_group_egresss:
    - name: SecurityGroupEgress1
      group_id: "sg-12345678 "
      ip_protocol: "tcp"
      cidr_ip: "0.0.0.0/0"
      from_port: 80
      to_port: 80
      description: "Allow HTTP outbound"
    - name: SecurityGroupEgress2
      group_id: "sg-87654321 "
      ip_protocol: "tcp"
      cidr_ipv6: "::/0"
      from_port: 443
      to_port: 443
      description: "Allow HTTPS outbound to IPv6"
      deletion_policy: Retain
    - name: SecurityGroupEgress3
      group_id: "sg-abcdef01 "
      ip_protocol: "-1"
      destination_security_group_id: "sg-99999999"
      description: "Allow all traffic to security group"
      update_replace_policy: Retain

stack_tags:
  Test: ec2-security-group-egress
