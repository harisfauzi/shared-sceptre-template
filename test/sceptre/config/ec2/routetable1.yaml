---
template:
  type: file
  path: ec2/route_table.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: 'Route tables for test environment'
  route_tables:
    - name: PublicRouteTable
      vpc_id: 'vpc-12345678'
      deletion_policy: 'Delete'
      update_replace_policy: 'Delete'
      tags:
        Name: PublicRouteTable
        Tier: Public
        Project: 'myproject'
      route_entries:
        - name: DefaultRoute
          destination_cidr_block: '0.0.0.0/0'
          gateway_id: 'igw-abcdef01'
        - name: PrivateRoute
          destination_cidr_block: '10.0.0.0/8'
          nat_gateway_id: 'natgw-xyz12345'
    - name: PrivateRouteTable
      vpc_id: 'vpc-87654321'
      tags:
        Name: PrivateRouteTable
        Tier: Private
        Project: 'myproject'
      route_entries:
        - name: ToNAT
          destination_cidr_block: '0.0.0.0/0'
          nat_gateway_id: 'natgw-xyz12345'

stack_tags:
  Test: ec2-route-table
