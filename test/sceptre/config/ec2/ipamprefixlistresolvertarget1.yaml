---
template:
  type: file
  path: ec2/ipam_prefix_list_resolver_target.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: Sample IPAM Prefix List Resolver Targets
  ipam_prefix_list_resolver_targets:
    - name: ResolverTarget1
      ipam_prefix_list_resolver_id: ipam-plr-12345678
      prefix_list_id: pl-abcdef01
      prefix_list_region: us-east-1
      track_latest_version: true
      tags:
        Name: ResolverTarget1
        Project: "{{ project_code }}"
        Environment: Production
    - name: ResolverTarget2
      ipam_prefix_list_resolver_id: ipam-plr-87654321
      prefix_list_id: pl-ghijkl02
      prefix_list_region: us-west-2
      track_latest_version: false
      desired_version: 5
      deletion_policy: Retain
      tags:
        Name: ResolverTarget2
        Project: "{{ project_code }}"
        Environment: Staging
    - name: ResolverTarget3
      ipam_prefix_list_resolver_id: ipam-plr-aabbccdd
      prefix_list_id: pl-mnopqr03
      prefix_list_region: eu-west-1
      tags:
        Name: ResolverTarget3
        Project: "{{ project_code }}"
        Owner: NetworkTeam

stack_tags:
  Test: ec2-ipam-prefix-list-resolver-target
