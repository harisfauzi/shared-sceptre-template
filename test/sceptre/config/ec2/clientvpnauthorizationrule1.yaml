---
template:
  type: file
  path: ec2/client_vpn_authorization_rule.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  client_vpn_authorization_rules:
    - name: AllowCorpNetwork
      client_vpn_endpoint_id: cvpn-endpoint-0123456789abcdef0
      target_network_cidr: 10.0.0.0/8
      authorize_all_groups: true
      description: "Allow access to corporate network for all users"
    - name: AllowDevTeam
      client_vpn_endpoint_id: cvpn-endpoint-0123456789abcdef0
      target_network_cidr: 172.16.0.0/12
      access_group_id: sgr-0a1b2c3d4e5f67890
      description: "Allow access to development VPC for dev team"
      deletion_policy: Retain
    - name: AllowProdNetwork
      client_vpn_endpoint_id: cvpn-endpoint-0123456789abcdef0
      target_network_cidr: 192.168.0.0/16
      access_group_id: sgr-1a2b3c4d5e6f78901

stack_tags:
  Test: ec2-clientvpnauthorizationrule
