---
template:
  type: file
  path: ec2/security_group_ingres.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: Sample Security Group Ingress Rules
  security_group_ingresss:
    - name: SecurityGroupIngress1
      ip_protocol: "tcp"
      cidr_ip: "10.0.0.0/8"
      group_id: "sg-12345678"
      from_port: 443
      to_port: 443
      description: "Allow HTTPS from internal network"
    - name: SecurityGroupIngress2
      ip_protocol: "tcp"
      cidr_ipv6: "::/0"
      group_id: "sg-87654321"
      from_port: 22
      to_port: 22
      source_security_group_id: "sg-11111111 "
      source_security_group_owner_id: "123456789012"
      description: "Allow SSH from security group"
      deletion_policy: Retain
    - name: SecurityGroupIngress3
      ip_protocol: "-1"
      group_name: "default"
      source_prefix_list_id: "pl-12345678 "
      description: "Allow all traffic from prefix list"
      update_replace_policy: Retain

stack_tags:
  Test: ec2-security-group-ingress
