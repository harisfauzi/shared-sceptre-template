---
template:
  type: file
  path: ec2/local_gateway_virtual_interface.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Sample Local Gateway Virtual Interfaces
  local_gateway_virtual_interfaces:
    - name: VirtualInterface1
      local_address: "10.0.0.1"
      local_gateway_virtual_interface_group_id: "lgw-vif-grp-12345678"
      outpost_lag_id: "lag-abcdef01"
      peer_address: "192.168.1.1"
      vlan: 100
      peer_bgp_asn: 65000
      tags:
        Name: VirtualInterface1
        Project: "{{ project_code }}"
        Environment: Production
    - name: VirtualInterface2
      local_address: "10.0.0.2"
      local_gateway_virtual_interface_group_id: "lgw-vif-grp-87654321"
      outpost_lag_id: "lag-ghijkl02"
      peer_address: "192.168.1.2"
      vlan: 200
      peer_bgp_asn_extended: 4200000001
      deletion_policy: Retain
      tags:
        Name: VirtualInterface2
        Project: "{{ project_code }}"
        Environment: Staging
    - name: VirtualInterface3
      local_address: "10.0.0.3"
      local_gateway_virtual_interface_group_id: "lgw-vif-grp-aabbccdd"
      outpost_lag_id: "lag-mnopqr03"
      peer_address: "192.168.1.3"
      vlan: 300
      peer_bgp_asn: 65001
      update_replace_policy: Retain
      tags:
        Name: VirtualInterface3
        Project: "{{ project_code }}"
        Owner: NetworkOps

stack_tags:
  Test: ec2-local-gateway-virtual-interface
