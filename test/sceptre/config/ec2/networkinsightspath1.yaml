---
template:
  type: file
  path: ec2/network_insights_path.yaml.j2

sceptre_user_data:
  project_code: "{{ stack_group_config.project_code }}"
  source_repo_url: "{{git_repo}}"
  description: Sample Network Insights Paths
  network_insights_paths:
    - name: PathAnalysis1
      protocol: "tcp"
      source: "eni-12345678"
      destination: "eni-87654321"
      destination_port: 443
      tags:
        Name: PathAnalysis1
        Project: "{{ project_code }}"
        Environment: Production
    - name: PathAnalysis2
      protocol: "udp"
      source: "vpc-12345678"
      source_ip: "10.0.0.5"
      destination_ip: "10.1.0.10"
      destination_port: 53
      filter_at_source:
        source_address: "10.0.0.0/24"
        source_port_range:
          from_port: 1024
          to_port: 65535
        destination_address: "10.1.0.0/24"
        destination_range:
          from_port: 53
          to_port: 53
      deletion_policy: Retain
      tags:
        Name: PathAnalysis2
        Project: "{{ project_code }}"
        Environment: Staging
    - name: PathAnalysis3
      protocol: "tcp"
      source: "subnet-abcdef01"
      destination: "subnet-ghijkl02"
      destination_ip: "172.16.0.20"
      destination_port: 3306
      filter_at_destination:
        source_address: "192.168.1.0/24"
        destination_address: "172.16.0.0/16"
        destination_range:
          from_port: 3306
          to_port: 3306
      filter_at_source:
        source_address: "192.168.1.100"
        source_port_range:
          from_port: 50000
          to_port: 50100
      update_replace_policy: Retain
      tags:
        Name: PathAnalysis3
        Project: "{{ project_code }}"
        Owner: NetworkOps

stack_tags:
  Test: ec2-network-insights-path
