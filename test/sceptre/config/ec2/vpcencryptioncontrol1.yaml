---
template:
  type: file
  path: ec2/vpc_encryption_control.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: EC2 VPC Encryption Controls
  vpc_encryption_controls:
    - name: PrimaryEncryptionControl
      vpc_id: "vpc-12345678901234567"
      mode: "encrypt"
      deletion_policy: Delete
      update_replace_policy: Delete
      internet_gateway_exclusion_input: "exclude"
      nat_gateway_exclusion_input: "exclude"
      tags:
        Environment: Production
        Owner: SecurityTeam
        Purpose: EnforceEncryption
    - name: SecondaryEncryptionControl
      vpc_id: "vpc-87654321098765432"
      mode: "encrypt"
      deletion_policy: Delete
      elastic_file_system_exclusion_input: "exclude"
      lambda_exclusion_input: "exclude"
      vpc_peering_exclusion_input: "exclude"
      tags:
        Environment: Staging
        Owner: NetworkTeam
    - name: TertiaryEncryptionControl
      vpc_id: "vpc-abcdef1234567890ab"
      mode: "encrypt"
      deletion_policy: Retain
      egress_only_internet_gateway_exclusion_input: "exclude"
      virtual_private_gateway_exclusion_input: "exclude"
      vpc_lattice_exclusion_input: "exclude"
      tags:
        Environment: Development
        Owner: CloudEngineering

stack_tags:
  Test: ec2-vpc-encryption-control
