---
template:
  type: file
  path: ec2/verified_access_group.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: EC2 Verified Access Groups
  verified_access_groups:
    - name: PrimarySecurityGroup
      verified_access_instance_id: "vai-1234567890abcdef0"
      description: "Primary security group for verified access"
      deletion_policy: Delete
      update_replace_policy: Delete
      policy_enabled: true
      policy_document: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": "*",
              "Action": "ec2:*",
              "Resource": "*",
              "Condition": {
                "StringEquals": {
                  "ec2:SourceVpc": "vpc-12345678901234567"
                }
              }
            }
          ]
        }
      sse_specification:
        customer_managed_key_enabled: true
        kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      tags:
        Environment: Production
        Owner: SecurityTeam
        CostCenter: "1001"
    - name: SecondaryNetworkGroup
      verified_access_instance_id: "vai-0987654321fedcba0"
      description: "Secondary network group for staging environment"
      deletion_policy: Delete
      policy_enabled: false
      tags:
        Environment: Staging
        Owner: NetworkTeam
    - name: TertiaryDevelopmentGroup
      verified_access_instance_id: "vai-abcdef1234567890a"
      description: "Development group for testing"
      deletion_policy: Retain
      policy_enabled: true
      policy_document: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": "*",
              "Action": "ec2:Describe*",
              "Resource": "*"
            }
          ]
        }
      tags:
        Environment: Development
        Owner: CloudEngineering
        Tier: Testing

stack_tags:
  Test: ec2-verified-access-group
