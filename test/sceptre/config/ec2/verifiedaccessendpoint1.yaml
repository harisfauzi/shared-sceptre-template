---
template:
  type: file
  path: ec2/verified_access_endpoint.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: EC2 Verified Access Endpoints
  verified_access_endpoints:
    - name: PrimaryNetworkEndpoint
      attachment_type: vpc
      endpoint_type: load_balancer
      verified_access_group_id: "vagr-1234567890abcdef0"
      application_domain: "app.example.com"
      endpoint_domain_prefix: "primary-app"
      deletion_policy: Delete
      update_replace_policy: Delete
      load_balancer_options:
        load_balancer_arn: "arn:aws:elasticloadbalancing:us-east-1:123456789012:loadbalancer/app/my-alb/1234567890abcdef"
        port: 443
        protocol: "https"
        subnet_ids:
          - "subnet-11111111111111111"
          - "subnet-22222222222222222"
      cidr_options:
        cidr: "10.0.0.0/8"
        protocol: "tcp"
        port_ranges:
          - from_port: 443
            to_port: 443
          - from_port: 80
            to_port: 80
      security_group_ids:
        - "sg-11111111111111111"
      tags:
        Environment: Production
        Owner: SecurityTeam
        Tier: Access
    - name: SecondaryDatabaseEndpoint
      attachment_type: vpc
      endpoint_type: network_interface
      verified_access_group_id: "vagr-0987654321fedcba0"
      description: "Database access endpoint"
      endpoint_domain_prefix: "db-access"
      rds_options:
        rds_db_instance_arn: "arn:aws:rds:us-east-1:123456789012:db:prod-mysql-01"
        port: 3306
        protocol: "tcp"
        subnet_ids:
          - "subnet-33333333333333333"
      network_interface_options:
        network_interface_id: "eni-12345678901234567"
        port: 3306
        protocol: "tcp"
      policy_enabled: true
      sse_specification:
        customer_managed_key_enabled: true
        kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      tags:
        Environment: Production
        Owner: DatabaseTeam
    - name: TertiaryApplicationEndpoint
      attachment_type: vpc
      endpoint_type: load_balancer
      verified_access_group_id: "vagr-abcdef1234567890a"
      endpoint_domain_prefix: "tertiary-app"
      deletion_policy: Retain
      load_balancer_options:
        load_balancer_arn: "arn:aws:elasticloadbalancing:us-east-1:123456789012:loadbalancer/app/secondary-alb/0987654321fedcba"
        port_ranges:
          - from_port: 443
            to_port: 443
          - from_port: 8443
            to_port: 8443
        protocol: "https"
        subnet_ids:
          - "subnet-44444444444444444"
      security_group_ids:
        - "sg-22222222222222222"
        - "sg-33333333333333333"
      tags:
        Environment: Staging
        Owner: DevOpsTeam
        Version: "2.0"

stack_tags:
  Test: ec2-verified-access-endpoint
