---
template:
  type: file
  path: ec2/network_insights_access_scope_analysis.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Sample Network Insights Access Scope Analyses
  network_insights_access_scope_analysises:
    - name: ScopeAnalysis1
      network_insights_access_scope_id: "ains-12345678abcdef01"
      tags:
        Name: ScopeAnalysis1
        Project: "{{ project_code }}"
        Environment: Production
    - name: ScopeAnalysis2
      network_insights_access_scope_id: "ains-87654321ghijkl02"
      deletion_policy: Retain
      tags:
        Name: ScopeAnalysis2
        Project: "{{ project_code }}"
        Environment: Staging
    - name: ScopeAnalysis3
      network_insights_access_scope_id: "ains-aabbccddmnopqr03"
      update_replace_policy: Retain
      tags:
        Name: ScopeAnalysis3
        Project: "{{ project_code }}"
        Owner: NetworkOps

stack_tags:
  Test: ec2-network-insights-access-scope-analysis
