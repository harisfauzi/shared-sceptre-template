---
template:
  type: file
  path: ec2/nat_gateway.yaml.j2

sceptre_user_data:
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Sample NAT Gateways
  nat_gateways:
    - name: NatGateway1
      subnet_id: "subnet-12345678"
      allocation_id: "eipalloc-abcdef01"
      connectivity_type: public
      tags:
        Name: NatGateway1
        Project: "{{ project_code }}"
        Environment: Production
    - name: NatGateway2
      subnet_id: "subnet-87654321"
      allocation_id: "eipalloc-ghijkl02"
      connectivity_type: private
      private_ip_address: "10.0.1.10"
      max_drain_duration_seconds: 300
      secondary_allocation_ids:
        - "eipalloc-secondary01"
        - "eipalloc-secondary02"
      deletion_policy: Retain
      tags:
        Name: NatGateway2
        Project: "{{ project_code }}"
        Environment: Staging
    - name: NatGateway3
      subnet_id: "subnet-aabbccdd"
      allocation_id: "eipalloc-mnopqr03"
      private_ip_address: "10.0.2.10"
      secondary_private_ip_address_count: 2
      secondary_private_ip_addresses:
        - "10.0.2.11"
        - "10.0.2.12"
      update_replace_policy: Retain
      tags:
        Name: NatGateway3
        Project: "{{ project_code }}"
        Owner: NetworkOps

stack_tags:
  Test: ec2-nat-gateway
