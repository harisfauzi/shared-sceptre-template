---
template:
  type: file
  path: secretsmanager/secret_target_attachment.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecretsManager Secret Target Attachment(s) for testing purposes"
  secret_target_attachments:
    - name: ProductionRdsSecretAttachment
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/rds/password-abc123"
      target_id: "arn:aws:rds:us-east-1:123456789012:db:prod-database-instance"
      target_type: RdsDbInstance
      deletion_policy: Delete
      update_replace_policy: Delete

    - name: DocumentDbClusterSecretAttachment
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/docdb/credentials-xyz789"
      target_id: "arn:aws:docdb:us-east-1:123456789012:cluster:prod-docdb-cluster"
      target_type: DocDbCluster
      deletion_policy: Delete
      update_replace_policy: Delete

    - name: RedshiftClusterSecretAttachment
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/redshift/admin-def456"
      target_id: "arn:aws:redshift:us-east-1:123456789012:cluster:prod-redshift-cluster"
      target_type: RedshiftCluster
      deletion_policy: Delete
      update_replace_policy: Delete

    - name: StagingRdsSecretAttachment
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:staging/rds/password-ghi789"
      target_id: "arn:aws:rds:us-east-1:123456789012:db:staging-database-instance"
      target_type: RdsDbInstance
      deletion_policy: Retain
      update_replace_policy: Retain

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: secretsmanager-secret-target-attachment