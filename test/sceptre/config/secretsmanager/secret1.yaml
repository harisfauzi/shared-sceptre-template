---
template:
  type: file
  path: secretsmanager/secret.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecretsManager Secret(s) for testing purposes"
  secrets:
    - name: DatabasePasswordSecret
      secret_name: prod/rds/master-password
      description: "RDS Master Database Password"
      deletion_policy: Delete
      update_replace_policy: Delete
      generate_secret_string:
        password_length: 32
        exclude_characters: "/@\\"
        require_each_included_type: true
        exclude_punctuation: false
      kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      replica_regions:
        - region: us-west-2
          kms_key_id: "arn:aws:kms:us-west-2:123456789012:key/87654321-4321-4321-4321-210987654321"
        - region: eu-west-1
      tags:
        Environment: Production
        Application: Database
        Owner: DatabaseTeam
      resource_policy:
        resource_policy_json: |-
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "AWS": "arn:aws:iam::123456789012:role/rds-access-role"
                },
                "Action": "secretsmanager:GetSecretValue",
                "Resource": "*"
              }
            ]
          }
        block_public_policy: true

    - name: ApiKeySecret
      secret_name: prod/api/external-key
      description: "External API Key"
      deletion_policy: Delete
      update_replace_policy: Delete
      # There should be secret_string here but GitHub blocks the push.
      # This is just to test that the template renders correctly when secret_string is not defined.
      tags:
        Environment: Production
        Application: API
        Sensitive: "true"

    - name: ServiceAccountCredentialSecret
      secret_name: prod/service-account/credentials
      description: "Service Account Credentials with JSON Template"
      deletion_policy: Delete
      update_replace_policy: Delete
      generate_secret_string:
        secret_string_template: '{"username": "service_account", "hostname": "db.example.com"}'
        generate_string_key: password
        password_length: 24
        exclude_numbers: false
        exclude_uppercase: false
        exclude_lowercase: false
      kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/abcdef12-3456-7890-abcd-ef1234567890"
      tags:
        Environment: Production
        Application: ServiceAccount
        Team: DevOps

    - name: HighlyRestrictedSecret
      secret_name: prod/restricted/admin-token
      description: "Highly Restricted Admin Token"
      deletion_policy: Retain
      update_replace_policy: Retain
      generate_secret_string:
        password_length: 48
        exclude_characters: "'!@#$%^&*()'"
        exclude_punctuation: true
        include_space: false
        require_each_included_type: true
      replica_regions:
        - region: us-west-2
        - region: eu-central-1
          kms_key_id: "arn:aws:kms:eu-central-1:123456789012:key/fedcba98-7654-3210-fedc-ba9876543210"
        - region: ap-southeast-1
      tags:
        Environment: Production
        Classification: Restricted
        Compliance: HIPAA
        Owner: SecurityTeam

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: secretsmanager-secret