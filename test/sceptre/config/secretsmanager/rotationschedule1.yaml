---
template:
  type: file
  path: secretsmanager/rotation_schedule.yaml.j2

sceptre_user_data:
  project_code: "{{ project_code }}"
  source_repo_url: "{{ git_repo }}"
  description: "SecretsManager Rotation Schedule(s) for testing purposes"
  rotation_schedules:
    - name: DatabasePasswordRotationSchedule
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/rds/password-abc123"
      deletion_policy: Delete
      update_replace_policy: Delete
      rotate_immediately_on_update: true
      rotation_rules:
        automatically_after_days: 30
        duration: "3h"
        schedule_expression: "rate(30 days)"
      hosted_rotation_lambda:
        rotation_type: PostgresqlSingleUser
        runtime: python3.11
        exclude_characters: "/@\\"
        vpc_security_group_ids: "sg-12345678,sg-87654321"
        vpc_subnet_ids: "subnet-12345678,subnet-87654321"

    - name: ApiKeyRotationSchedule
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/api/key-xyz789"
      deletion_policy: Delete
      update_replace_policy: Delete
      rotate_immediately_on_update: false
      rotation_lambda_arn: "arn:aws:lambda:us-east-1:123456789012:function:rotate-api-key"
      rotation_rules:
        automatically_after_days: 90

    - name: ExternalServiceRotationSchedule
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/external/service-cred"
      deletion_policy: Retain
      update_replace_policy: Retain
      external_secret_rotation_role_arn: "arn:aws:iam::123456789012:role/external-rotation-role"
      external_secret_rotation_metadata:
        - key: ServiceEndpoint
          value: "https://external-service.example.com"
        - key: RotationType
          value: "CustomServiceRotation"
        - key: MaxRetries
          value: "3"
      rotation_rules:
        schedule_expression: "rate(60 days)"
        duration: "2h"

    - name: MysqlDatabaseRotationSchedule
      secret_id: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/mysql/credentials"
      deletion_policy: Delete
      update_replace_policy: Delete
      hosted_rotation_lambda:
        rotation_type: MySQLSingleUser
        runtime: python3.11
        kms_key_arn: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
        superuser_secret_arn: "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/mysql/admin"
      rotation_rules:
        automatically_after_days: 45

stack_tags:
  Environment: Test
  ManagedBy: Sceptre
  Test: secretsmanager-rotation-schedule