---
template:
  type: file
  path: acmpca/certificate_authority.yaml.j2

sceptre_user_data:
  # Custom template description (optional - defaults to ACMPCA CertificateAuthority(es) for <project_code>)
  description: "Comprehensive ACMPCA Test Suite covering all template variables"
  project_code: "{{stack_group_config.project_code}}"
  source_repo_url: "{{git_repo}}"
  certificate_authorities:
    # ========== Test 1: Minimal ROOT CA ==========
    # Tests basic required fields with defaults for optional fields
    - name: RootCAMinimal
      key_algorithm: RSA_2048
      signing_algorithm: SHA256WITHRSA
      type: ROOT
      subject:
        common_name: Minimal Root CA
        country: US
        state: CA
        locality: San Francisco
        organization: Test Corp
        organizational_unit: Security

    # ========== Test 2: Full ROOT CA with all subject fields ==========
    # Tests all possible subject attributes
    - name: RootCAFullSubject
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: ROOT
      deletion_policy: Retain
      update_replace_policy: Snapshot
      subject:
        common_name: Full Subject Root CA
        country: AU
        state: QLD
        locality: Brisbane
        organization: Demo Company
        organizational_unit: Demo PKI
        distinguished_name_qualifier: "qualifier-001"
        generation_qualifier: "Jr."
        given_name: John
        initials: "JD"
        pseudonym: "jp-root"
        serial_number: "SERIAL-12345"
        surname: Doe
        title: "Chief Security Officer"
        custom_attributes:
          - object_identifier: "2.5.4.9"
            value: "123 Main Street"
          - object_identifier: "2.5.4.17"
            value: "94105"
      key_storage_security_standard: FIPS_140_2_LEVEL_3
      tags:
        CAType: Root CA - Full Subject
        Environment: Test
        DataClassification: Public

    # ========== Test 3: Intermediate CA with CSR Key Usage ==========
    # Tests all key usage flags
    - name: IntermediateKeyUsage
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with Full Key Usage
        country: AU
        state: QLD
        locality: Brisbane
        organization: Demo Company
        organizational_unit: Demo PKI
      csr_extensions:
        key_usage:
          crl_sign: true
          data_encipherment: true
          digital_signature: true
          key_agreement: true
          key_cert_sign: true
          key_encipherment: true
          non_repudiation: true
          decipher_only: false
          encipher_only: false
      usage_mode: GENERAL_PURPOSE
      tags:
        CAType: Intermediate CA
        KeyUsageLevel: Full

    # ========== Test 4: CA with CSR Subject Information Access (Directory Name) ==========
    # Tests directory name in subject information access
    - name: IntermediateCASIADirectory
      key_algorithm: RSA_3072
      signing_algorithm: SHA384WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA Directory
        country: AU
        state: NSW
        locality: Sydney
        organization: Demo Company
        organizational_unit: Demo PKI
      csr_extensions:
        subject_information_access:
          - access_location:
              directory_name:
                common_name: OCSP Responder Directory
                organization: Demo Company
                country: AU
            access_method:
              access_method_type: OCSP
          - access_location:
              directory_name:
                common_name: CA Issuers Directory
                organization: Demo Company
                organizational_unit: PKI Services
                country: AU
            access_method:
              access_method_type: CA_ISSUERS
      usage_mode: ALL_PURPOSES
      tags:
        CAType: Intermediate with SIA
        SIAType: Directory

    # ========== Test 5: CA with CSR Subject Information Access (DNS Name) ==========
    # Tests DNS name in subject information access
    - name: IntermediateCASIADNS
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA DNS
        country: US
        state: NY
        locality: New York
        organization: Global Corp
        organizational_unit: Infrastructure
      csr_extensions:
        subject_information_access:
          - access_location:
              dns_name: ocsp.example.com
            access_method:
              access_method_type: OCSP
          - access_location:
              dns_name: caissuers.example.com
            access_method:
              access_method_type: CA_ISSUERS
      tags:
        CAType: Intermediate with SIA
        SIAType: DNS

    # ========== Test 6: CA with CSR Subject Information Access (IP Address) ==========
    # Tests IP address in subject information access
    - name: IntermediateCASIAIP
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA IP
        country: US
        state: TX
        locality: Dallas
        organization: Tech Solutions
        organizational_unit: Security Services
      csr_extensions:
        subject_information_access:
          - access_location:
              ip_address: "192.0.2.1"
            access_method:
              access_method_type: OCSP
          - access_location:
              ip_address: "203.0.113.42"
            access_method:
              access_method_type: CA_ISSUERS
      tags:
        CAType: Intermediate with SIA
        SIAType: IP

    # ========== Test 7: CA with CSR Subject Information Access (RFC822 - Email) ==========
    # Tests RFC822 (email) in subject information access
    - name: IntermediateCASIAEmail
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA Email
        country: GB
        state: England
        locality: London
        organization: UK Company
        organizational_unit: PKI Team
      csr_extensions:
        subject_information_access:
          - access_location:
              rfc822_name: ocsp@example.co.uk
            access_method:
              access_method_type: OCSP
          - access_location:
              rfc822_name: ca-admin@example.co.uk
            access_method:
              access_method_type: CA_ISSUERS
      tags:
        CAType: Intermediate with SIA
        SIAType: Email

    # ========== Test 8: CA with CSR Subject Information Access (URI) ==========
    # Tests Uniform Resource Identifier in subject information access
    - name: IntermediateCASIAURI
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA URI
        country: DE
        state: Bavaria
        locality: Munich
        organization: EU Corporation
        organizational_unit: Digital Services
      csr_extensions:
        subject_information_access:
          - access_location:
              uniform_resource_identifier: https://ocsp.example.eu/v1
            access_method:
              access_method_type: OCSP
          - access_location:
              uniform_resource_identifier: https://ca.example.eu/certificates
            access_method:
              access_method_type: CA_ISSUERS
      tags:
        CAType: Intermediate with SIA
        SIAType: URI

    # ========== Test 9: CA with CSR Subject Information Access (Registered ID) ==========
    # Tests Registered ID in subject information access
    - name: IntermediateCASIARegisteredID
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA Registered ID
        country: JP
        state: Tokyo
        locality: Tokyo
        organization: Japan Inc
        organizational_unit: Security Division
      csr_extensions:
        subject_information_access:
          - access_location:
              registered_id: "1.2.3.4.5.6.7.8.9.0"
            access_method:
              access_method_type: OCSP
      tags:
        CAType: Intermediate with SIA
        SIAType: RegisteredID

    # ========== Test 10: CA with CSR Subject Information Access (EDI Party Name) ==========
    # Tests EDI Party Name in subject information access
    - name: IntermediateCASIAEDIParty
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA EDI Party
        country: CA
        state: Ontario
        locality: Toronto
        organization: Canadian Corp
        organizational_unit: Business Services
      csr_extensions:
        subject_information_access:
          - access_location:
              edi_party_name:
                party_name: "EDI Party 001"
                name_assigner: "Global Registry"
            access_method:
              access_method_type: OCSP
      tags:
        CAType: Intermediate with SIA
        SIAType: EDIParty

    # ========== Test 11: CA with CSR Subject Information Access (Other Name) ==========
    # Tests Other Name in subject information access
    - name: IntermediateCASIAOtherName
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with SIA Other Name
        country: SG
        state: Singapore
        locality: Singapore
        organization: Singapore Enterprises
        organizational_unit: Technology
      csr_extensions:
        subject_information_access:
          - access_location:
              other_name:
                type_id: "2.16.840.1.101.3.4.2.1"
                value: "Custom-Value-001"
            access_method:
              access_method_type: OCSP
      tags:
        CAType: Intermediate with SIA
        SIAType: OtherName

    # ========== Test 12: CA with CSR Subject Information Access (Custom Access Method) ==========
    # Tests custom object identifier in access method
    - name: IntermediateCASIACustomMethod
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with Custom Access Method
        country: IN
        state: Karnataka
        locality: Bangalore
        organization: India Technologies
        organizational_unit: PKI Services
      csr_extensions:
        subject_information_access:
          - access_location:
              dns_name: custom-service.example.in
            access_method:
              custom_object_identifier: "1.3.6.1.5.5.7.48.9"
      tags:
        CAType: Intermediate with Custom Method
        CustomOID: "1.3.6.1.5.5.7.48.9"

    # ========== Test 13: CA with CRL Configuration (Enabled) ==========
    # Tests CRL revocation configuration with all options
    - name: IntermediateCRLFull
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with Full CRL Config
        country: AU
        state: VIC
        locality: Melbourne
        organization: Demo Company
        organizational_unit: Infrastructure
      revocation_configuration:
        crl_configuration:
          enabled: true
          crl_type: DELTA
          custom_cname: crl.example.com
          custom_path: "'/certs/crl'"
          expiration_in_days: 7
          s3_bucket_name: my-crl-bucket
          s3_object_acl: PUBLIC_READ
          crl_distribution_point_extension:
            omit_extension: false
      tags:
        CAType: Intermediate with CRL
        RevocationType: CRL

    # ========== Test 14: CA with CRL Configuration (Disabled) ==========
    # Tests CRL revocation configuration disabled with basic settings
    - name: IntermediateCRLMinimal
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with Minimal CRL
        country: AU
        state: SA
        locality: Adelaide
        organization: Demo Company
        organizational_unit: Security
      revocation_configuration:
        crl_configuration:
          enabled: false
      tags:
        CAType: Intermediate with CRL Minimal
        RevocationType: CRL

    # ========== Test 15: CA with OCSP Configuration ==========
    # Tests OCSP revocation configuration
    - name: IntermediateCAOCSP
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with OCSP Config
        country: AU
        state: WA
        locality: Perth
        organization: Demo Company
        organizational_unit: Compliance
      revocation_configuration:
        ocsp_configuration:
          enabled: true
          ocsp_custom_name: ocsp.example.com
      tags:
        CAType: Intermediate with OCSP
        RevocationType: OCSP

    # ========== Test 16: CA with Both CRL and OCSP Configuration ==========
    # Tests complete revocation configuration with both CRL and OCSP
    - name: IntermediateCRLAndOCSP
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA with CRL and OCSP
        country: AU
        state: NT
        locality: Darwin
        organization: Demo Company
        organizational_unit: Enterprise PKI
      revocation_configuration:
        crl_configuration:
          enabled: true
          crl_type: ALL
          expiration_in_days: 30
          s3_bucket_name: my-crl-bucket
          crl_distribution_point_extension:
            omit_extension: false
        ocsp_configuration:
          enabled: true
          ocsp_custom_name: ocsp.example.com
      tags:
        CAType: Intermediate with Full Revocation
        RevocationType: Both

    # ========== Test 17: CA with Key Storage and Usage Mode ==========
    # Tests key storage security standard and different usage modes
    - name: IntermediateCAFIPSGeneral
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA FIPS General
        country: US
        state: VA
        locality: Arlington
        organization: Federal Agency
        organizational_unit: Security Operations
      key_storage_security_standard: FIPS_140_2_LEVEL_2
      usage_mode: GENERAL_PURPOSE
      tags:
        CAType: Intermediate FIPS
        SecurityStandard: FIPS_140_2_LEVEL_2
        UsageMode: GENERAL_PURPOSE

    # ========== Test 18: CA with FIPS Level 3 and ALL_PURPOSES ==========
    # Tests maximum security standard with all purposes usage mode
    - name: IntermediateCAFIPSAllPurposes
      key_algorithm: RSA_4096
      signing_algorithm: SHA512WITHRSA
      type: SUBORDINATE
      subject:
        common_name: Intermediate CA FIPS All Purposes
        country: US
        state: MD
        locality: Washington
        organization: National Organization
        organizational_unit: Critical Infrastructure
      key_storage_security_standard: FIPS_140_2_LEVEL_3
      usage_mode: ALL_PURPOSES
      tags:
        CAType: Intermediate FIPS Max
        SecurityStandard: FIPS_140_2_LEVEL_3
        UsageMode: ALL_PURPOSES

stack_tags:
  TestSuite: "Comprehensive ACMPCA Coverage"
  TemplateVersion: "Full Variable Test"
  Version: "2.0.0"
