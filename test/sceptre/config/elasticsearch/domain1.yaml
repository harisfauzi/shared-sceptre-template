---
template:
  type: file
  path: elasticsearch/domain.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: "Elasticsearch Domains for search and logging"
  use_parameter_for_password: true
  domains:
    - name: ProductionDomain
      domain_name: production-es-domain
      elasticsearch_version: "7.10"
      deletion_policy: Retain
      update_policy:
        enable_version_upgrade: true
      elasticsearch_cluster_config:
        instance_type: t3.small.elasticsearch
        instance_count: 3
        dedicated_master_enabled: true
        dedicated_master_type: t3.small.elasticsearch
        dedicated_master_count: 3
        zone_awareness_enabled: true
        zone_awareness_config:
          availability_zone_count: 3
        warm_enabled: true
        warm_type: ultrawarm1.medium.elasticsearch
        warm_count: 2
        cold_storage_options:
          enabled: true
      ebs_options:
        ebs_enabled: true
        volume_type: gp3
        volume_size: 100
        iops: 3000
      encryption_at_rest_options:
        enabled: true
        kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      node_to_node_encryption_options:
        enabled: true
      domain_endpoint_options:
        enforce_https: true
        tls_security_policy: Policy-Min-TLS-1-2-2019-07
        custom_endpoint_enabled: true
        custom_endpoint: "es.example.com"
        custom_endpoint_certificate_arn: "arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
      advanced_security_options:
        enabled: true
        internal_user_database_enabled: true
        anonymous_auth_enabled: false
        master_user_options:
          master_user_name: admin
          master_user_password: "ChangeMe123!@#"
      vpc_options:
        subnet_ids:
          - subnet-12345678
          - subnet-87654321
          - subnet-11111111
        security_group_ids:
          - sg-12345678
          - sg-87654321
      snapshot_options:
        automated_snapshot_start_hour: 3
      log_publishing_options:
        ES_APPLICATION_LOGS:
          CloudWatchLogsLogGroupArn: "arn:aws:logs:us-east-1:123456789012:log-group:/aws/elasticsearch/domains/production/application-logs"
          Enabled: true
        INDEX_SLOW_LOGS:
          CloudWatchLogsLogGroupArn: "arn:aws:logs:us-east-1:123456789012:log-group:/aws/elasticsearch/domains/production/index-logs"
          Enabled: true
      advanced_options:
        rest.action.multi.allow_explicit_index: "true"
        indices.fielddata.cache.size: "40"
      tags:
        Environment: Production
        Team: DataEngineering
        CostCenter: Analytics

    - name: DevelopmentDomain
      domain_name: development-es-domain
      elasticsearch_version: "7.10"
      deletion_policy: Delete
      elasticsearch_cluster_config:
        instance_type: t3.small.elasticsearch
        instance_count: 2
        zone_awareness_enabled: false
      ebs_options:
        ebs_enabled: true
        volume_type: gp2
        volume_size: 50
      encryption_at_rest_options:
        enabled: false
      node_to_node_encryption_options:
        enabled: false
      domain_endpoint_options:
        enforce_https: false
      advanced_security_options:
        enabled: false
      tags:
        Environment: Development
        Team: DataEngineering

    - name: LoggingDomain
      domain_name: logging-es-domain
      elasticsearch_version: "7.10"
      deletion_policy: Retain
      elasticsearch_cluster_config:
        instance_type: m5.large.elasticsearch
        instance_count: 5
        dedicated_master_enabled: true
        dedicated_master_type: m5.large.elasticsearch
        dedicated_master_count: 3
        zone_awareness_enabled: true
        zone_awareness_config:
          availability_zone_count: 3
      ebs_options:
        ebs_enabled: true
        volume_type: gp3
        volume_size: 500
        iops: 5000
      encryption_at_rest_options:
        enabled: true
      node_to_node_encryption_options:
        enabled: true
      domain_endpoint_options:
        enforce_https: true
        tls_security_policy: Policy-Min-TLS-1-2-2019-07
      advanced_security_options:
        enabled: true
        internal_user_database_enabled: true
        master_user_options:
          master_user_name: elastic
          master_user_password: "SecurePassword123!@#"
      cognito_options:
        enabled: false
      vpc_options:
        subnet_ids:
          - subnet-log-1111
          - subnet-log-2222
          - subnet-log-3333
        security_group_ids:
          - sg-log-1111
      snapshot_options:
        automated_snapshot_start_hour: 2
      log_publishing_options:
        ES_APPLICATION_LOGS:
          CloudWatchLogsLogGroupArn: "arn:aws:logs:us-east-1:123456789012:log-group:/aws/elasticsearch/domains/logging/application-logs"
          Enabled: true
      advanced_options:
        indices.query.bool.max_clause_count: "2048"
      tags:
        Environment: Production
        Team: Operations
        Purpose: Logging

    - name: SecureDomain
      domain_name: secure-es-domain
      elasticsearch_version: "7.10"
      deletion_policy: Retain
      elasticsearch_cluster_config:
        instance_type: c5.xlarge.elasticsearch
        instance_count: 3
        dedicated_master_enabled: true
        dedicated_master_type: c5.large.elasticsearch
        dedicated_master_count: 3
      ebs_options:
        ebs_enabled: true
        volume_type: gp3
        volume_size: 200
        iops: 4000
      encryption_at_rest_options:
        enabled: true
        kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/87654321-4321-4321-4321-210987654321"
      node_to_node_encryption_options:
        enabled: true
      domain_endpoint_options:
        enforce_https: true
        tls_security_policy: Policy-Min-TLS-1-2-2019-07
      advanced_security_options:
        enabled: true
        internal_user_database_enabled: true
        anonymous_auth_enabled: false
        master_user_options:
          master_user_name: kibanauser
          master_user_password: "KibanaSecure456!@#"
      cognito_options:
        enabled: true
        identity_pool_id: "us-east-1:12345678-1234-1234-1234-123456789012"
        user_pool_id: "us-east-1_abcdef123"
        role_arn: "arn:aws:iam::123456789012:role/CognitoAccessRole"
      vpc_options:
        subnet_ids:
          - subnet-sec-1111
          - subnet-sec-2222
        security_group_ids:
          - sg-sec-1111
      tags:
        Environment: Production
        Team: Security
        Compliance: PCI

stack_tags:
  Test: elasticsearch-domain

