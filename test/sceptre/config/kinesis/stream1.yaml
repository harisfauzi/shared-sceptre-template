---
template:
  type: file
  path: kinesis/stream.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Kinesis Streams for {{project_code}}
  streams:
    - name: EventsStream
      stream_name: prod-events
      shard_count: 5
      retention_period_hours: 24
      stream_encryption:
        encryption_type: KMS
        key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
      desired_shard_level_metrics:
        - IncomingBytes
        - IncomingRecords
        - OutgoingBytes
        - OutgoingRecords
        - WriteProvisionedThroughputExceeded
        - ReadProvisionedThroughputExceeded
        - IteratorAgeMilliseconds
        - ALL
      tags:
        Environment: Production
        Team: DataEngineering
        Application: EventProcessing
    - name: AnalyticsStream
      stream_name: prod-analytics
      stream_mode_details:
        stream_mode: ON_DEMAND
      retention_period_hours: 48
      max_record_size_in_kib: 1024
      desired_shard_level_metrics:
        - IncomingBytes
        - IncomingRecords
      stream_encryption:
        encryption_type: NONE
        key_id: "none"
      tags:
        Environment: Production
        Team: Analytics
        Application: DataWarehouse
    - name: DevelopmentStream
      stream_name: dev-logs
      shard_count: 1
      retention_period_hours: 12
      warm_throughput_mibps: 5
      tags:
        Environment: Development
        Team: Logging

stack_tags:
  Test: kinesis-stream
