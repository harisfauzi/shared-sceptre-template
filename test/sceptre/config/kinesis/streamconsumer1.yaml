---
template:
  type: file
  path: kinesis/stream_consumer.yaml.j2

sceptre_user_data:
  project_code: "{{project_code}}"
  source_repo_url: "{{git_repo}}"
  description: Kinesis Stream Consumers for {{project_code}}
  stream_consumers:
    - name: AnalyticsConsumer
      consumer_name: prod-analytics-consumer
      stream_arn: "arn:aws:kinesis:us-east-1:123456789012:stream/prod-events/consumer/prod-analytics-consumer"
      tags:
        Environment: Production
        Team: Analytics
        Application: DataWarehouse
    - name: EventsConsumer
      consumer_name: prod-events-processor
      stream_arn: "arn:aws:kinesis:us-east-1:123456789012:stream/prod-events/consumer/prod-events-processor"
      tags:
        Environment: Production
        Team: EventProcessing
        Application: RealTimeProcessor
    - name: LogsConsumer
      consumer_name: dev-logs-consumer
      stream_arn: "arn:aws:kinesis:us-east-1:123456789012:stream/dev-logs/consumer/dev-logs-consumer"
      tags:
        Environment: Development
        Team: Logging
        Application: LogAggregation

stack_tags:
  Test: kinesis-streamconsumer
